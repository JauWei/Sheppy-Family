<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>角落生物數學教室 | Sumikko Gurashi Math</title>
<script src="https://unpkg.com/mqtt@5.10.1/dist/mqtt.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg-cream:#FFF8F0;--bg-pink:#FFF0F5;--text-dark:#5C4033;--text-medium:#8B7355;
    --accent-pink:#F4A7B9;--accent-blue:#87CEEB;--accent-green:#98D4A6;
    --correct:#7BC67E;--wrong:#E88B8B;
  }
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg-cream);color:var(--text-dark);min-height:100vh;overflow-x:hidden}
  .bg-deco{position:fixed;pointer-events:none;z-index:0;opacity:.15;font-size:40px}

  /* ===== Header ===== */
  .header{background:linear-gradient(135deg,var(--accent-pink),#F9D1D8);padding:25px 20px 20px;text-align:center;position:relative;overflow:hidden;box-shadow:0 4px 20px rgba(244,167,185,.3)}
  .header::before{content:'';position:absolute;top:-30px;left:-30px;right:-30px;bottom:-30px;background:radial-gradient(circle at 20% 50%,rgba(255,255,255,.3) 0%,transparent 50%),radial-gradient(circle at 80% 30%,rgba(255,255,255,.2) 0%,transparent 40%)}
  .header h1{font-size:2em;font-weight:900;color:#fff;text-shadow:2px 2px 0 rgba(0,0,0,.1);position:relative;z-index:1;letter-spacing:2px}
  .header p{color:rgba(255,255,255,.9);font-size:.95em;margin-top:5px;position:relative;z-index:1}

  /* ===== Mode Select ===== */
  .mode-screen{max-width:600px;margin:40px auto;padding:0 15px;text-align:center;position:relative;z-index:1}
  .mode-screen h2{font-size:1.5em;margin-bottom:25px;color:var(--text-dark)}
  .mode-cards{display:flex;gap:20px;flex-wrap:wrap;justify-content:center}
  .mode-card{background:#fff;border-radius:24px;padding:30px 25px;width:250px;cursor:pointer;border:3px solid #eee;box-shadow:0 6px 25px rgba(0,0,0,.06);transition:all .3s}
  .mode-card:hover{border-color:var(--accent-pink);transform:translateY(-5px);box-shadow:0 12px 35px rgba(244,167,185,.2)}
  .mode-card .mode-icon{font-size:3em;margin-bottom:12px}
  .mode-card h3{font-size:1.2em;margin-bottom:8px}
  .mode-card p{font-size:.85em;color:var(--text-medium);line-height:1.5}

  /* ===== Score Bar ===== */
  .score-bar{display:flex;justify-content:center;gap:20px;padding:12px 20px;background:#fff;border-bottom:2px dashed var(--accent-pink);flex-wrap:wrap}
  .score-item{display:flex;align-items:center;gap:6px;font-weight:700;font-size:.9em}
  .score-item .icon{font-size:1.2em}
  .score-val{background:var(--bg-cream);padding:2px 10px;border-radius:20px;min-width:30px;text-align:center;border:2px solid var(--accent-pink)}

  /* ===== HP Bar ===== */
  .hp-section{max-width:750px;margin:15px auto 0;padding:0 15px}
  .hp-bar-wrap{background:#fff;border-radius:16px;padding:14px 18px;margin-bottom:10px;box-shadow:0 3px 12px rgba(0,0,0,.05);border:2px solid #eee}
  .hp-bar-wrap.boss{border-color:#E88B8B}
  .hp-bar-wrap.p1{border-color:var(--accent-blue)}
  .hp-bar-wrap.p2{border-color:var(--accent-pink)}
  .hp-label{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-weight:700;font-size:.9em}
  .hp-label img{width:36px;height:36px;border-radius:50%;object-fit:cover}
  .hp-label .hp-name{flex:1}
  .hp-label .hp-text{color:var(--text-medium);font-size:.85em}
  .hp-track{width:100%;height:18px;background:#eee;border-radius:10px;overflow:hidden;position:relative}
  .hp-fill{height:100%;border-radius:10px;transition:width .5s ease;position:relative}
  .hp-fill.green{background:linear-gradient(90deg,#81C784,#4CAF50)}
  .hp-fill.red{background:linear-gradient(90deg,#E57373,#D32F2F)}
  .hp-fill.blue{background:linear-gradient(90deg,#64B5F6,#1E88E5)}
  .hp-fill.pink{background:linear-gradient(90deg,#F48FB1,#E91E63)}

  /* ===== Boss Banner ===== */
  .boss-banner{max-width:750px;margin:15px auto;padding:0 15px}
  .boss-card{background:linear-gradient(135deg,#FFE0E0,#FFF0E0);border-radius:20px;padding:20px;text-align:center;border:3px solid #E88B8B;animation:bossIn .6s ease}
  @keyframes bossIn{from{opacity:0;transform:scale(.8)}to{opacity:1;transform:scale(1)}}
  .boss-card h2{color:#C62828;font-size:1.4em;margin-bottom:5px}
  .boss-card p{color:var(--text-medium);font-size:.9em}
  .boss-card .boss-img{width:100px;height:100px;border-radius:50%;margin:10px auto;object-fit:cover;border:4px solid #E88B8B;box-shadow:0 4px 15px rgba(232,139,139,.3)}

  /* ===== Main ===== */
  .main{max-width:750px;margin:0 auto;padding:15px 15px 100px;position:relative;z-index:1}

  /* ===== Character Card ===== */
  .character-card{background:#fff;border-radius:24px;padding:25px;margin-bottom:20px;box-shadow:0 6px 25px rgba(0,0,0,.06);border:3px solid var(--accent-pink);position:relative;overflow:hidden;animation:cardIn .5s ease}
  @keyframes cardIn{from{opacity:0;transform:translateY(30px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
  .character-card::before{content:'';position:absolute;top:0;left:0;right:0;height:6px;background:linear-gradient(90deg,var(--accent-pink),var(--accent-blue),var(--accent-green),var(--accent-pink));background-size:300% 100%;animation:shimmer 3s linear infinite}
  @keyframes shimmer{0%{background-position:0% 0%}100%{background-position:300% 0%}}
  .char-top{display:flex;align-items:center;gap:18px;margin-bottom:18px}
  .char-avatar{width:90px;height:90px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.08);border:3px solid #fff;position:relative;overflow:hidden}
  .char-avatar img{width:100%;height:100%;object-fit:cover}
  .char-info h3{font-size:1.2em;font-weight:900;margin-bottom:4px}
  .char-info .char-desc{font-size:.82em;color:var(--text-medium);line-height:1.5}
  .char-speech{background:var(--bg-cream);border-radius:16px;padding:14px 18px;margin-bottom:18px;position:relative;font-size:.92em;line-height:1.6;border:2px dashed rgba(0,0,0,.08)}
  .char-speech::before{content:'';position:absolute;top:-10px;left:30px;width:0;height:0;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:10px solid var(--bg-cream)}
  .q-type{display:inline-block;padding:3px 14px;border-radius:20px;font-size:.78em;font-weight:700;margin-bottom:12px}
  .q-type.linear{background:#E3F2FD;color:#1565C0}
  .q-type.system{background:#FFF3E0;color:#E65100}
  .math-display{background:linear-gradient(135deg,#FAFAFA,#F5F5F5);border-radius:16px;padding:20px;margin-bottom:18px;text-align:center;font-size:1.5em;font-weight:700;color:var(--text-dark);border:2px solid #eee;line-height:1.8}
  .math-display .eq-line{display:block;margin:4px 0}
  .answer-area{display:flex;flex-direction:column;gap:12px}
  .input-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .input-row label{font-weight:700;font-size:1.1em;min-width:45px}
  .input-row input{flex:1;min-width:80px;max-width:200px;padding:10px 16px;border:3px solid #ddd;border-radius:14px;font-size:1.1em;font-family:inherit;transition:border-color .3s;outline:none;background:#FAFAFA}
  .input-row input:focus{border-color:var(--accent-pink);background:#fff}
  .btn-row{display:flex;gap:10px;margin-top:5px;flex-wrap:wrap}
  .btn{padding:12px 28px;border:none;border-radius:16px;font-size:1em;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;gap:8px}
  .btn:active{transform:scale(.95)}
  .btn-check{background:linear-gradient(135deg,var(--accent-pink),#F08CA0);color:#fff;box-shadow:0 4px 12px rgba(244,167,185,.4)}
  .btn-hint{background:linear-gradient(135deg,var(--accent-blue),#6CB4E0);color:#fff;box-shadow:0 4px 12px rgba(135,206,235,.4)}
  .btn-next{background:linear-gradient(135deg,var(--accent-green),#7BC67E);color:#fff;box-shadow:0 4px 12px rgba(152,212,166,.4)}
  .btn-show-answer{background:linear-gradient(135deg,#FFD54F,#FFB300);color:#5D4037;box-shadow:0 4px 12px rgba(255,183,0,.3)}
  .btn-back{background:linear-gradient(135deg,#B0BEC5,#90A4AE);color:#fff;box-shadow:0 4px 12px rgba(0,0,0,.1)}

  .result-box{padding:16px 20px;border-radius:16px;margin-top:15px;font-weight:700;font-size:1em;line-height:1.6;animation:fadeIn .3s ease}
  @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .result-box.correct{background:#E8F5E9;color:#2E7D32;border:2px solid var(--correct)}
  .result-box.wrong{background:#FFEBEE;color:#C62828;border:2px solid var(--wrong)}
  .result-box.hint{background:#E3F2FD;color:#1565C0;border:2px solid var(--accent-blue)}
  .result-box.answer{background:#FFF8E1;color:#5D4037;border:2px solid #FFB300}
  .solution-steps{margin-top:15px;background:#FFFDE7;border-radius:16px;padding:18px;border:2px solid #FFF176}
  .solution-steps h4{font-size:1em;margin-bottom:10px;color:#F57F17}
  .solution-steps .step{padding:6px 0;font-size:.9em;line-height:1.6;border-bottom:1px dashed #FFF176;color:var(--text-dark)}
  .solution-steps .step:last-child{border-bottom:none}

  /* ===== Settings ===== */
  .settings-toggle{position:fixed;bottom:20px;right:20px;z-index:100;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,var(--accent-pink),#F08CA0);color:#fff;border:none;font-size:1.5em;cursor:pointer;box-shadow:0 6px 20px rgba(244,167,185,.4);transition:all .3s;display:flex;align-items:center;justify-content:center}
  .settings-toggle:hover{transform:scale(1.1)}
  .settings-panel{position:fixed;bottom:90px;right:20px;z-index:99;background:#fff;border-radius:20px;padding:20px;box-shadow:0 10px 40px rgba(0,0,0,.15);border:3px solid var(--accent-pink);display:none;min-width:260px;animation:panelIn .3s ease}
  @keyframes panelIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .settings-panel.show{display:block}
  .settings-panel h3{font-size:1em;margin-bottom:12px;color:var(--accent-pink)}
  .setting-item{display:flex;align-items:center;justify-content:space-between;padding:8px 0;font-size:.9em}
  .setting-item select{padding:5px 10px;border:2px solid #ddd;border-radius:10px;font-family:inherit;font-size:.9em;outline:none}

  /* ===== Lobby (PvP) ===== */
  .lobby{max-width:500px;margin:30px auto;padding:0 15px;position:relative;z-index:1}
  .lobby-card{background:#fff;border-radius:24px;padding:30px;box-shadow:0 6px 25px rgba(0,0,0,.06);border:3px solid var(--accent-blue);text-align:center}
  .lobby-card h2{margin-bottom:15px;font-size:1.3em}
  .lobby-card p{font-size:.9em;color:var(--text-medium);margin-bottom:15px;line-height:1.5}
  .lobby-card input[type=text]{width:100%;max-width:300px;padding:12px 16px;border:3px solid #ddd;border-radius:14px;font-size:1.1em;text-align:center;font-family:inherit;outline:none;margin-bottom:12px;letter-spacing:3px}
  .lobby-card input[type=text]:focus{border-color:var(--accent-blue)}
  .room-code{font-size:2em;font-weight:900;color:var(--accent-pink);letter-spacing:5px;background:var(--bg-cream);padding:12px 20px;border-radius:16px;display:inline-block;margin:10px 0;user-select:all;border:2px dashed var(--accent-pink)}
  .lobby-status{margin-top:15px;font-size:.9em;color:var(--text-medium)}
  .lobby-status.connected{color:var(--correct);font-weight:700}
  .lobby-status.error{color:var(--wrong)}

  /* ===== PvP Battle Layout ===== */
  .pvp-timer{text-align:center;font-size:2em;font-weight:900;color:var(--accent-pink);margin:10px 0 5px;position:relative;z-index:1}

  /* ===== Victory / Defeat ===== */
  .end-screen{max-width:500px;margin:40px auto;padding:0 15px;text-align:center;position:relative;z-index:1}
  .end-card{background:#fff;border-radius:24px;padding:40px 30px;box-shadow:0 6px 25px rgba(0,0,0,.06);border:3px solid var(--accent-pink)}
  .end-card .end-icon{font-size:4em;margin-bottom:10px}
  .end-card h2{font-size:1.8em;margin-bottom:10px}
  .end-card p{font-size:1em;color:var(--text-medium);line-height:1.6;margin-bottom:5px}

  /* ===== Streak / Confetti ===== */
  .streak-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);font-size:3em;font-weight:900;color:#FF6F00;text-shadow:2px 2px 0 rgba(0,0,0,.1);z-index:200;pointer-events:none;opacity:0;transition:all .5s ease}
  .streak-popup.show{transform:translate(-50%,-50%) scale(1);opacity:1}
  .streak-popup.hide{transform:translate(-50%,-70%) scale(1.2);opacity:0}
  .confetti-container{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:150;overflow:hidden}
  .confetti-piece{position:absolute;width:10px;height:10px;border-radius:2px;top:-20px;animation:confettiFall 2s ease-in forwards}
  @keyframes confettiFall{to{top:110vh;transform:rotate(720deg);opacity:0}}

  @media(max-width:500px){
    .header h1{font-size:1.5em}
    .math-display{font-size:1.2em;padding:15px}
    .char-avatar{width:70px;height:70px}
    .main{padding:15px 10px 100px}
    .mode-card{width:100%}
  }
</style>
</head>
<body>

<div id="bgDecos"></div>
<div class="streak-popup" id="streakPopup"></div>
<div class="confetti-container" id="confetti"></div>

<div class="header">
  <h1>角落生物數學教室</h1>
  <p id="headerSub">和角落小夥伴一起學數學吧！</p>
</div>

<div id="app"></div>

<button class="settings-toggle" id="settingsBtn" title="設定" style="display:none">&#x2699;</button>
<div class="settings-panel" id="settingsPanel">
  <h3>&#x2699; 設定</h3>
  <div class="setting-item">
    <span>題目類型</span>
    <select id="qType">
      <option value="mixed">混合出題</option>
      <option value="linear">一元一次方程式</option>
      <option value="system">二元一次聯立方程式</option>
    </select>
  </div>
  <div class="setting-item">
    <span>難度</span>
    <select id="difficulty">
      <option value="easy">簡單</option>
      <option value="medium" selected>普通</option>
      <option value="hard">困難</option>
    </select>
  </div>
</div>

<script>
// ========== CHARACTER DATA ==========
const IMG_BASE = 'https://www.san-x.co.jp/uploads/';
const characters = [
  { id:'shirokuma',name:'白熊',nameJP:'しろくま',color:'#F5F0E8',borderColor:'#E8DFD0',desc:'怕冷的北極熊，從北方逃到南方，喜歡喝熱茶和蓋棉被。',speeches:['好冷好冷...來做道數學題暖暖腦吧～','躲在角落算數學，感覺好安心呢...','裹著裹布算數學最舒服了～','一邊喝熱茶一邊算數學吧！'],img:IMG_BASE+'1769160910869-6ah340f176m/1.webp'},
  { id:'penguin',name:'企鵝？',nameJP:'ぺんぎん？',color:'#B8D4A8',borderColor:'#A0C490',desc:'不確定自己是不是企鵝，頭上好像曾經有個盤子，每天都在尋找自我。',speeches:['我到底是不是企鵝呢...先算數學吧？','雖然不知道自己是誰，但數學題還是會解的！','解開這題也許就能找到答案了...','邊吃小黃瓜邊算數學～'],img:IMG_BASE+'1769160911896-hktlduhyts4/2.webp'},
  { id:'tonkatsu',name:'炸豬排',nameJP:'とんかつ',color:'#F5D6B8',borderColor:'#E8C4A0',desc:'炸豬排邊邊的肉，99%是油脂，因為太油被吃剩下來，希望有天能被吃掉。',speeches:['雖然被剩下了...但數學題不會被剩下的！','1%是瘦肉，99%是油...100%會算數學！','希望能像解出答案一樣被需要...','炸得酥酥脆脆地來做數學吧～'],img:IMG_BASE+'1769160912753-mwcvofiw1hb/3.webp'},
  { id:'neko',name:'貓',nameJP:'ねこ',color:'#F5E6A0',borderColor:'#E8D888',desc:'害羞的貓咪，喜歡躲在角落磨牆壁，很在意身材但又愛吃東西。',speeches:['在角落磨爪子...順便算個數學吧～','好想吃東西...先用數學分散注意力！','喵～這題看起來好好玩！','躲在角落偷偷算數學，好害羞...'],img:IMG_BASE+'1769160913779-hxpekre7c8/4.webp'},
  { id:'tokage',name:'蜥蜴',nameJP:'とかげ',color:'#A8D8D8',borderColor:'#90C4C4',desc:'其實是倖存的恐龍，偽裝成蜥蜴生活，很想念住在海裡的媽媽。',speeches:['噓...這是秘密喔，其實我是恐龍～先來算數學！','好想念媽媽...做數學題讓心情好起來！','偽裝成蜥蜴也要認真學數學呢！','游泳和數學都難不倒我～'],img:IMG_BASE+'1769160914647-qw2yqsyzgxo/5.webp'},
  { id:'ebifurai',name:'炸蝦尾',nameJP:'えびふらいのしっぽ',color:'#F5C49C',borderColor:'#E0AE80',desc:'因為太硬被吃剩的炸蝦尾巴，和炸豬排是好朋友。',speeches:['雖然硬硬的不好咬...但數學題我咬得動！','和炸豬排一起做數學最開心了～','以前身體好長好長...現在腦袋要變長！','炸蝦尾也能解出數學題哦！'],img:IMG_BASE+'1769160915458-c4rz2zaocsb/6.webp'},
  { id:'tapioca',name:'粉圓',nameJP:'たぴおか',color:'#FFF8DC',borderColor:'#E8E0C0',desc:'珍珠奶茶裡被喝剩的粉圓，因為不好吸所以被放棄。',speeches:['......（盯著數學題看）','不好吸沒關係，數學題我會解！','（模仿計算機的樣子）嗶嗶～','粉圓很多，數學答案只有一個！'],img:IMG_BASE+'1769160916269-4r3gjdtlyjf/7.webp'},
  { id:'furoshiki',name:'裹布',nameJP:'ふろしき',color:'#F2C6D0',borderColor:'#E0AAB8',desc:'白熊的行李布，常被拿來當野餐墊、靠墊。',speeches:['被白熊裹著好溫暖～一起算數學吧！','我可以變成各種形狀，數學也有很多變化呢！','攤開來當作數學作業本～','包住答案，不讓它跑走！'],img:IMG_BASE+'1769160917892-rro27jr8ej8/9.webp'},
  { id:'zassou',name:'雜草',nameJP:'ざっそう',color:'#C8E6A0',borderColor:'#B0D480',desc:'積極正面的小草，夢想成為花店裡的花束。',speeches:['今天也要元氣滿滿地做數學！','只要努力，雜草也能開花！數學也一樣！','嘿嘿～數學題難不倒我！','用根部吸收知識，腦袋開花！'],img:IMG_BASE+'1769160918911-waiv4guw2e/10.webp'},

// ========== UTILITY ==========
function randInt(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(a){return a[Math.floor(Math.random()*a.length)]}
function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b]}return a}
function formatFraction(n,d){if(d<0){n=-n;d=-d}const g=gcd(Math.abs(n),d);n/=g;d/=g;if(d===1)return`${n}`;return n<0?`-${Math.abs(n)}/${d}`:`${n}/${d}`}
function formatCoeff(c,first,v){if(c===0)return'';if(first){if(c===1)return v;if(c===-1)return'-'+v;return c+v}if(c===1)return' + '+v;if(c===-1)return' - '+v;return c>0?' + '+c+v:' - '+Math.abs(c)+v}

// ========== QUESTION GENERATORS ==========
function genLinearEasy(){const x=randInt(-10,10),a=randInt(1,6)*(Math.random()<.3?-1:1),b=randInt(-15,15),c=a*x+b;const eq=`${formatCoeff(a,true,'x')}${b>=0?' + '+b:' - '+Math.abs(b)} = ${c}`;return{type:'linear',display:eq,answer:{x},steps:[`原式：${eq}`,`移項：${formatCoeff(a,true,'x')} = ${c}${b>=0?' - '+b:' + '+Math.abs(b)}`,`化簡：${formatCoeff(a,true,'x')} = ${c-b}`,a!==1?`兩邊除以 ${a}：x = ${formatFraction(c-b,a)}`:'',`答案：x = ${x}`].filter(Boolean),hint:'提示：先把常數項移到等號右邊，再除以 x 的係數。'}}
function genLinearMedium(){const x=randInt(-8,8);let a=randInt(2,8)*(Math.random()<.3?-1:1),c=randInt(1,7)*(Math.random()<.3?-1:1);if(a===c)c+=Math.random()<.5?1:-1;const b=randInt(-12,12),d=a*x+b-c*x;const eq=`${formatCoeff(a,true,'x')}${b>=0?' + '+b:' - '+Math.abs(b)} = ${formatCoeff(c,true,'x')}${d>=0?' + '+d:' - '+Math.abs(d)}`;return{type:'linear',display:eq,answer:{x},steps:[`原式：${eq}`,`移項合併：${formatCoeff(a-c,true,'x')} = ${d-b}`,a-c!==1?`兩邊除以 ${a-c}：x = ${formatFraction(d-b,a-c)}`:'',`答案：x = ${x}`].filter(Boolean),hint:'提示：把含 x 的項移到左邊，常數移到右邊。'}}
function genLinearHard(){const x=randInt(-5,5),a=randInt(2,5),b=randInt(1,4)*(Math.random()<.3?-1:1),cv=randInt(-8,8),d=randInt(2,4),e=randInt(1,3)*(Math.random()<.3?-1:1),f=(a*(b*x+cv)-d*e*x)/d;if(!Number.isInteger(f)||Math.abs(f)>20)return genLinearMedium();const eq=`${a}(${formatCoeff(b,true,'x')}${cv>=0?' + '+cv:' - '+Math.abs(cv)}) = ${d}(${formatCoeff(e,true,'x')}${f>=0?' + '+f:' - '+Math.abs(f)})`;const la=a*b,lb=a*cv,ra=d*e,rb=d*f;return{type:'linear',display:eq,answer:{x},steps:[`原式：${eq}`,`展開：${formatCoeff(la,true,'x')}${lb>=0?' + '+lb:' - '+Math.abs(lb)} = ${formatCoeff(ra,true,'x')}${rb>=0?' + '+rb:' - '+Math.abs(rb)}`,`移項：${formatCoeff(la-ra,true,'x')} = ${rb-lb}`,(la-ra)!==1?`x = ${formatFraction(rb-lb,la-ra)}`:'',`答案：x = ${x}`].filter(Boolean),hint:'提示：先展開括號，再移項合併。'}}
function genSystemEasy(){const x=randInt(-8,8),y=randInt(-8,8),s=x+y,d=x-y;return{type:'system',display:[`x + y = ${s}`,`x - y = ${d}`],answer:{x,y},steps:[`式(1) + 式(2)：2x = ${s+d}`,`x = ${x}`,`代入式(1)：y = ${s} - ${x} = ${y}`,`答案：x = ${x}，y = ${y}`],hint:'提示：把兩式相加消去 y。'}}
function genSystemMedium(){const x=randInt(-6,6),y=randInt(-6,6),a1=randInt(1,5),b1=randInt(1,5)*(Math.random()<.4?-1:1),a2=randInt(1,5),b2=randInt(1,5)*(Math.random()<.4?-1:1);if(a1*b2===a2*b1)return genSystemEasy();const c1=a1*x+b1*y,c2=a2*x+b2*y;return{type:'system',display:[`${formatCoeff(a1,true,'x')}${formatCoeff(b1,false,'y')} = ${c1}`,`${formatCoeff(a2,true,'x')}${formatCoeff(b2,false,'y')} = ${c2}`],answer:{x,y},steps:[`用加減消去法消去一個未知數`,`解出 x = ${x}`,`代回求得 y = ${y}`,`答案：x = ${x}，y = ${y}`],hint:'提示：用加減消去法，先消去一個未知數。'}}
function genSystemHard(){const x=randInt(-5,5),y=randInt(-5,5),a1=randInt(2,6)*(Math.random()<.3?-1:1),b1=randInt(2,6)*(Math.random()<.4?-1:1),a2=randInt(2,6)*(Math.random()<.3?-1:1),b2=randInt(2,6)*(Math.random()<.4?-1:1);if(a1*b2===a2*b1)return genSystemMedium();const c1=a1*x+b1*y,c2=a2*x+b2*y;return{type:'system',display:[`${formatCoeff(a1,true,'x')}${formatCoeff(b1,false,'y')} = ${c1}`,`${formatCoeff(a2,true,'x')}${formatCoeff(b2,false,'y')} = ${c2}`],answer:{x,y},steps:[`用加減消去法`,`式(1)×${Math.abs(a2)}，式(2)×${Math.abs(a1)}`,`消去 x 後求得 y = ${y}`,`代回求得 x = ${x}`,`答案：x = ${x}，y = ${y}`],hint:'提示：將兩式乘以適當倍數再相加減。'}}

function generateQuestion(diff){
  diff = diff || document.getElementById('difficulty').value;
  const qType = document.getElementById('qType').value;
  let type = qType==='mixed'?(Math.random()<.5?'linear':'system'):qType;
  if(type==='linear'){return diff==='easy'?genLinearEasy():diff==='medium'?genLinearMedium():genLinearHard()}
  return diff==='easy'?genSystemEasy():diff==='medium'?genSystemMedium():genSystemHard();
}

function buildQuestionHTML(ch, q, opts = {}) {
  const isSystem = q.type === 'system';
  const mathHtml = isSystem
    ? q.display.map((eq,i)=>`<span class="eq-line">式(${i+1})：${eq}</span>`).join('')
    : `<span class="eq-line">${q.display}</span>`;
  const inputHtml = isSystem
    ? `<div class="input-row"><label>x =</label><input type="number" id="ansX" step="any"></div>
       <div class="input-row"><label>y =</label><input type="number" id="ansY" step="any"></div>`
    : `<div class="input-row"><label>x =</label><input type="number" id="ansX" step="any"></div>`;
  const hintBtn = opts.hideHint ? '' : `<button class="btn btn-hint" onclick="${opts.hintFn||'soloHint'}()">&#x1F4A1; 提示</button>`;
  const showAnsBtn = opts.hideShowAns ? '' : `<button class="btn btn-show-answer" onclick="${opts.showAnsFn||'soloShowAnswer'}()">&#x1F440; 看答案</button>`;
  return `
    <div class="character-card">
      <div class="char-top">
        <div class="char-avatar" style="background:${ch.color};border-color:${ch.borderColor}">
          <img src="${ch.img}" alt="${ch.name}"/>
        </div>
        <div class="char-info">
          <h3>${ch.name} <small style="color:${ch.borderColor}">${ch.nameJP}</small></h3>
          <div class="char-desc">${ch.desc}</div>
        </div>
      </div>
      <div class="char-speech">${pick(ch.speeches)}</div>
      <span class="q-type ${q.type==='linear'?'linear':'system'}">${q.type==='linear'?'一元一次方程式':'二元一次聯立方程式'}</span>
      <div class="math-display">${mathHtml}</div>
      <div class="answer-area">
        ${inputHtml}
        <div class="btn-row">
          <button class="btn btn-check" onclick="${opts.checkFn||'soloCheck'}()">&#x2714; 確認答案</button>
          ${hintBtn}${showAnsBtn}
        </div>
        <div id="resultArea"></div>
      </div>
    </div>`;
}

function bindEnterKey(fn) {
  document.querySelectorAll('.answer-area input').forEach(inp => {
    inp.addEventListener('keydown', e => { if(e.key==='Enter') window[fn](); });
  });
  document.getElementById('ansX')?.focus();
}

function checkAnswerValues(q) {
  const xVal = parseFloat(document.getElementById('ansX')?.value);
  if(isNaN(xVal)) return null;
  if(q.type==='system'){
    const yVal = parseFloat(document.getElementById('ansY')?.value);
    if(isNaN(yVal)) return null;
    return Math.abs(xVal-q.answer.x)<.01 && Math.abs(yVal-q.answer.y)<.01;
  }
  return Math.abs(xVal-q.answer.x)<.01;
}

function showResult(type,msg){
  const a=document.getElementById('resultArea');if(!a)return;
  if(a.querySelector('.result-box')&&type==='hint'){a.innerHTML+=`<div class="result-box ${type}">${msg}</div>`;return}
  a.innerHTML=`<div class="result-box ${type}">${msg}</div>`+(a.querySelector('.solution-steps')?.outerHTML||'');
}
function showSolution(q){
  const a=document.getElementById('resultArea');if(!a)return;
  a.innerHTML+=`<div class="solution-steps"><h4>&#x1F4DD; 解題步驟</h4>${q.steps.map(s=>`<div class="step">${s}</div>`).join('')}</div>`;
}

function startSolo() {
  gameMode = 'solo';
  soloState = {
    level: 0, correct: 0, wrong: 0, streak: 0,
    playerHp: 10, playerMaxHp: 10,
    inBoss: false, bossHp: 0, bossMaxHp: 0, bossData: null,
    answered: false, currentChar: null, currentQuestion: null
  };
  document.getElementById('settingsBtn').style.display = 'flex';
  document.getElementById('headerSub').textContent = '單人通關模式';
  soloNextLevel();
}

function soloNextLevel() {
  const s = soloState;
  s.level++;
  s.answered = false;

  // Every 5 levels => boss
  if (s.level % 5 === 0 && s.level > 0) {
    s.inBoss = true;
    const bIdx = Math.min(Math.floor(s.level / 5) - 1, bosses.length - 1);
    s.bossData = bosses[bIdx];
    s.bossHp = s.bossData.hp + Math.floor(s.level / 10);
    s.bossMaxHp = s.bossHp;
    soloRenderBoss();
  } else {
    s.inBoss = false;
    soloRenderNormal();
  }
}

function soloRenderNormal() {
  const s = soloState;
  s.currentChar = pick(characters);
  s.currentQuestion = generateQuestion();
  s.answered = false;

  let html = `<div class="score-bar">
    <div class="score-item"><span class="icon">&#x1F3F0;</span><span>關卡</span><span class="score-val">${s.level}</span></div>

function soloCheck() {
  const s = soloState;
  if(s.answered) return;
  const result = checkAnswerValues(s.currentQuestion);
  if(result === null){ showResult('hint','請輸入數字答案哦！'); return; }
  s.answered = true;

  if(result) {
    s.correct++;
    s.streak++;
    if(s.inBoss) {
      s.bossHp--;
      showResult('correct',`答對了！對 ${s.bossData.name} 造成 1 點傷害！（剩餘 HP: ${s.bossHp}）`);
      if(s.streak>=3 && s.streak%3===0) showStreakAnim(s.streak);
      if(s.streak>=5) spawnConfetti();
      if(s.bossHp <= 0) {
        // Boss defeated
        setTimeout(()=>{
          spawnConfetti();
          showResult('correct',`&#x1F389; 打敗了 ${s.bossData.name}！繼續前進！`);
          setTimeout(()=>{ soloNextLevel(); }, 1500);
        }, 800);
        return;
      }
    } else {
      const msgs=[`太棒了！答對了！${s.currentChar.name}好開心！`,`正確！繼續加油！`,`完全正確！${s.currentChar.name}為你鼓掌！`];
      showResult('correct',pick(msgs));
      if(s.streak>=3 && s.streak%3===0) showStreakAnim(s.streak);
      if(s.streak>=5) spawnConfetti();
    }
  } else {
    s.wrong++;
    s.streak = 0;
    if(s.inBoss) {
      s.playerHp--;
      const q = s.currentQuestion;
      const ansStr = q.type==='system'?`x = ${q.answer.x}，y = ${q.answer.y}`:`x = ${q.answer.x}`;
      showResult('wrong',`答錯了！Boss 對你造成 1 點傷害！（你的 HP: ${s.playerHp}）正確答案：${ansStr}`);
      showSolution(q);
      if(s.playerHp <= 0) {
        setTimeout(()=>{ soloGameOver(); }, 1200);
        return;
      }
    } else {
      s.playerHp--;
      const q = s.currentQuestion;
      const ansStr = q.type==='system'?`x = ${q.answer.x}，y = ${q.answer.y}`:`x = ${q.answer.x}`;
      showResult('wrong',`不對哦...正確答案是 ${ansStr}（HP -1，剩餘: ${s.playerHp}）`);
      showSolution(q);
      if(s.playerHp <= 0) {
        setTimeout(()=>{ soloGameOver(); }, 1200);
        return;
      }
    }
  }
  // Next question button
  const area = document.getElementById('resultArea');
  if(area) {
    const nextFn = s.inBoss && s.bossHp > 0 ? 'soloRenderBoss' : 'soloNextLevel';
    area.innerHTML += `<div class="btn-row" style="margin-top:12px"><button class="btn btn-next" onclick="${nextFn}()">&#x27A1; ${s.inBoss && s.bossHp>0?'繼續挑戰':'下一關'}</button></div>`;
  }
}

function soloHint(){ if(!soloState.answered) showResult('hint', soloState.currentQuestion.hint); }
function soloShowAnswer(){
  const s=soloState; if(s.answered) return;
  s.answered=true; s.wrong++; s.streak=0; s.playerHp--;
  const q=s.currentQuestion;
  const ansStr=q.type==='system'?`x=${q.answer.x}，y=${q.answer.y}`:`x=${q.answer.x}`;
  showResult('answer',`答案：${ansStr}（HP -1，剩餘: ${s.playerHp}）`);
  showSolution(q);
  if(s.playerHp<=0){setTimeout(()=>soloGameOver(),1200);return}
  const area=document.getElementById('resultArea');
  const nextFn=s.inBoss&&s.bossHp>0?'soloRenderBoss':'soloNextLevel';
  if(area) area.innerHTML+=`<div class="btn-row" style="margin-top:12px"><button class="btn btn-next" onclick="${nextFn}()">&#x27A1; ${s.inBoss&&s.bossHp>0?'繼續挑戰':'下一關'}</button></div>`;
}

// ========================================================
//  PVP via MQTT (HiveMQ free public broker — no NAT issues)
// ========================================================
const MQTT_BROKER = 'wss://broker.hivemq.com:8884/mqtt';
let mqttClient = null;
let mqttRoom = null;  // room code
let mqttRole = null;  // 'host' or 'guest'

function makeRoomCode() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let code = '';
  for(let i=0;i<5;i++) code += chars[Math.floor(Math.random()*chars.length)];
  return code;
}

function mqttTopic(room, target) {
  // target: 'host' or 'guest' — the recipient
  return `sumikko-math/${room}/${target}`;
}

function mqttSend(data) {
  if(!mqttClient || !mqttClient.connected) { console.warn('[MQTT] Not connected'); return; }
  const target = mqttRole === 'host' ? 'guest' : 'host';
  const topic = mqttTopic(mqttRoom, target);
  mqttClient.publish(topic, JSON.stringify(data), { qos: 1 });
}

function pvpCleanup() {
  if(mqttClient) {
    try { mqttClient.end(true); } catch(e){}
    mqttClient = null;
  }
  mqttRoom = null;
  mqttRole = null;
}

function pvpCreateRoom() {
  pvpCleanup();
  const area = document.getElementById('lobbyArea');
  const status = document.getElementById('lobbyStatus');
  status.textContent = '正在連線到伺服器...';
  status.className = 'lobby-status';

  mqttRoom = makeRoomCode();
  mqttRole = 'host';

  mqttClient = mqtt.connect(MQTT_BROKER, {
    clientId: 'sg-host-' + mqttRoom + '-' + Date.now(),
    clean: true,
    connectTimeout: 10000,
    keepalive: 30
  });

  mqttClient.on('connect', () => {
    console.log('[MQTT] Host connected, room:', mqttRoom);
    // Subscribe to messages sent TO host
    mqttClient.subscribe(mqttTopic(mqttRoom, 'host'), { qos: 1 }, (err) => {
      if(err) { status.textContent = '訂閱失敗：' + err.message; return; }
      area.innerHTML = `<p style="margin-bottom:8px">把這個房間代碼傳給對手：</p>
        <div class="room-code" id="roomCodeDisplay">${mqttRoom}</div>
        <p style="font-size:.8em;color:var(--text-medium);margin-top:5px">點擊代碼可複製</p>`;
      document.getElementById('roomCodeDisplay').onclick = function(){
        navigator.clipboard.writeText(mqttRoom).then(()=>{
          status.textContent='已複製！等待對手加入...';
        });
      };
      status.textContent = '房間已建立！等待對手加入...';
    });
  });

  mqttClient.on('message', (topic, msg) => {
    try {
      const data = JSON.parse(msg.toString());
      if(data.type === 'join') {
        status.textContent = '對手已加入！開始遊戲...';
        status.className = 'lobby-status connected';
        // Confirm to guest
        mqttSend({ type: 'joined' });
        setTimeout(() => pvpStartGame(true), 500);
      } else {
        pvpOnData(data);
      }
    } catch(e) { console.error('[MQTT] Parse error:', e); }
  });

  mqttClient.on('error', e => {
    console.error('[MQTT] Error:', e);
    status.textContent = '連線錯誤，請重試';
    status.className = 'lobby-status error';
    area.innerHTML += `<div class="btn-row" style="justify-content:center;margin-top:12px">
      <button class="btn btn-check" onclick="pvpCreateRoom()">&#x1F504; 重試</button></div>`;
  });

  mqttClient.on('offline', () => {
    status.textContent = '伺服器離線，重新連線中...';
  });

  mqttClient.on('reconnect', () => {
    status.textContent = '重新連線中...';
  });
}

function pvpShowJoin() {
  const area = document.getElementById('lobbyArea');
  area.innerHTML = `<p style="margin-bottom:10px">輸入對手的房間代碼：</p>
    <input type="text" id="joinCode" placeholder="例如：ABC12" style="text-transform:uppercase"/>
    <br><button class="btn btn-check" id="joinBtn" onclick="pvpJoinRoom()" style="margin:0 auto">&#x1F517; 加入</button>`;
  document.getElementById('joinCode').addEventListener('keydown', e => { if(e.key==='Enter') pvpJoinRoom(); });
}

function pvpJoinRoom() {
  const codeInput = document.getElementById('joinCode');
  const code = codeInput ? codeInput.value.trim().toUpperCase() : '';
  if(!code) return;
  const status = document.getElementById('lobbyStatus');
  const joinBtn = document.getElementById('joinBtn');
  if(joinBtn) joinBtn.disabled = true;
  status.textContent = '正在連線到伺服器...';
  status.className = 'lobby-status';

  pvpCleanup();
  mqttRoom = code;
  mqttRole = 'guest';

  mqttClient = mqtt.connect(MQTT_BROKER, {
    clientId: 'sg-guest-' + code + '-' + Date.now(),
    clean: true,
    connectTimeout: 10000,
    keepalive: 30
  });

  mqttClient.on('connect', () => {
    console.log('[MQTT] Guest connected, joining room:', code);
    status.textContent = '已連線！正在加入房間 ' + code + '...';
    // Subscribe to messages sent TO guest
    mqttClient.subscribe(mqttTopic(code, 'guest'), { qos: 1 }, (err) => {
      if(err) { status.textContent = '訂閱失敗：' + err.message; return; }
      // Tell host we joined
      mqttSend({ type: 'join' });
      status.textContent = '已加入房間！等待對方開始...';
      status.className = 'lobby-status connected';
    });
  });

  let gameStarted = false;
  mqttClient.on('message', (topic, msg) => {
    try {
      const data = JSON.parse(msg.toString());
      if(data.type === 'joined' && !gameStarted) {
        gameStarted = true;
        status.textContent = '對方已確認！開始遊戲...';
        pvpStartGame(false);
      } else if(gameStarted) {
        pvpOnData(data);
      }
    } catch(e) { console.error('[MQTT] Parse error:', e); }
  });

  mqttClient.on('error', e => {
    console.error('[MQTT] Error:', e);
    status.textContent = '連線錯誤：' + e.message;
    status.className = 'lobby-status error';
    if(joinBtn) joinBtn.disabled = false;
  });

  // Timeout: if no response from host after 10s
  setTimeout(() => {
    if(!gameStarted && mqttClient && mqttClient.connected) {
      // Retry sending join
      mqttSend({ type: 'join' });
    }
  }, 5000);

  setTimeout(() => {
    if(!gameStarted) {
      status.textContent = `房間 ${code} 無回應。請確認對方已建立房間且代碼正確。`;
      status.className = 'lobby-status error';
      if(joinBtn) joinBtn.disabled = false;
      const area = document.getElementById('lobbyArea');
      if(area && !area.querySelector('.retry-btn')) {
        area.innerHTML += `<div class="btn-row retry-btn" style="justify-content:center;margin-top:12px">
          <button class="btn btn-check" onclick="pvpJoinRoom()">&#x1F504; 重試</button></div>`;
      }
    }
  }, 15000);
}

// ========== PVP GAME LOGIC ==========

function pvpStartGame(isHost) {
  pvpState = {
    isHost,
    myHp: 10, myMaxHp: 10,
    opHp: 10, opMaxHp: 10,
    myChar: pick(characters),
    opChar: pick(characters),
    currentQuestion: null,
    answered: false,
    myCorrect: 0, opCorrect: 0,
    round: 0
  };

  if(isHost) {
    pvpNewRound();
  }
  // Guest waits for question from host
}

function pvpNewRound() {
  const s = pvpState;
  s.round++;
  s.answered = false;
  s.myChar = pick(characters);
  const q = generateQuestion();
  s.currentQuestion = q;

  // Send question to opponent via MQTT
  mqttSend({ type:'question', question: q, round: s.round });
  pvpRenderBattle();
}

function pvpOnData(data) {
  if(!pvpState) return;
  const s = pvpState;

  if(data.type === 'question') {
    s.currentQuestion = data.question;
    s.round = data.round;
    s.answered = false;
    s.myChar = pick(characters);
    pvpRenderBattle();
  }
  else if(data.type === 'answered') {
    if(data.correct) {
      s.myHp = Math.max(0, s.myHp - 1);
      s.opCorrect++;
    } else {
      s.opHp = Math.max(0, s.opHp - 1);
    }
    pvpUpdateHpDisplay();
    if(s.myHp <= 0) pvpEndGame(false);
    else if(s.opHp <= 0) pvpEndGame(true);
  }
  else if(data.type === 'end') {
    pvpEndGame(!data.iWon);
  }
  else if(data.type === 'disconnect') {
    pvpEndGame(true);
  }
}

function pvpRenderBattle() {
  const s = pvpState;
  const q = s.currentQuestion;
  if(!q) return;

  let html = `<div class="score-bar">
    <div class="score-item"><span class="icon">&#x2694;&#xFE0F;</span><span>第 ${s.round} 回合</span></div>
    <div class="score-item"><span class="icon">&#x2705;</span><span>我答對</span><span class="score-val">${s.myCorrect}</span></div>
    <div class="score-item"><span class="icon">&#x1F4A2;</span><span>對手答對</span><span class="score-val">${s.opCorrect}</span></div>
  </div>`;

  html += `<div class="hp-section" id="hpSection">
    <div class="hp-bar-wrap p1">
      <div class="hp-label"><img src="${s.myChar.img}" alt=""/><span class="hp-name">&#x1F499; 我</span><span class="hp-text" id="myHpText">${s.myHp} / ${s.myMaxHp}</span></div>
      <div class="hp-track"><div class="hp-fill blue" id="myHpFill" style="width:${s.myHp/s.myMaxHp*100}%"></div></div>
    </div>
    <div class="hp-bar-wrap p2">
      <div class="hp-label"><img src="${s.opChar.img}" alt=""/><span class="hp-name">&#x1F49B; 對手</span><span class="hp-text" id="opHpText">${s.opHp} / ${s.opMaxHp}</span></div>
      <div class="hp-track"><div class="hp-fill pink" id="opHpFill" style="width:${s.opHp/s.opMaxHp*100}%"></div></div>
    </div>
  </div>`;

  html += `<div class="main">${buildQuestionHTML(s.myChar, q, {checkFn:'pvpCheck',hintFn:'pvpHint',hideShowAns:true})}</div>`;

  document.getElementById('app').innerHTML = html;
  bindEnterKey('pvpCheck');
}

function pvpUpdateHpDisplay() {
  const s = pvpState;
  const myF = document.getElementById('myHpFill');
  const opF = document.getElementById('opHpFill');
  const myT = document.getElementById('myHpText');
  const opT = document.getElementById('opHpText');
  if(myF) myF.style.width = (s.myHp/s.myMaxHp*100)+'%';
  if(opF) opF.style.width = (s.opHp/s.opMaxHp*100)+'%';
  if(myT) myT.textContent = `${s.myHp} / ${s.myMaxHp}`;
  if(opT) opT.textContent = `${s.opHp} / ${s.opMaxHp}`;
}

function pvpCheck() {
  const s = pvpState;
  if(s.answered) return;
  const result = checkAnswerValues(s.currentQuestion);
  if(result === null) { showResult('hint','請輸入數字答案哦！'); return; }
  s.answered = true;

  // Send result to opponent via MQTT
  mqttSend({ type:'answered', correct: result });

  if(result) {
    s.myCorrect++;
    s.opHp = Math.max(0, s.opHp - 1);
    showResult('correct','&#x2694;&#xFE0F; 答對了！對手 HP -1！');
    spawnConfetti();
  } else {
    s.myHp = Math.max(0, s.myHp - 1);
    const q = s.currentQuestion;
    const ansStr = q.type==='system'?`x=${q.answer.x}，y=${q.answer.y}`:`x=${q.answer.x}`;
    showResult('wrong',`答錯了...你的 HP -1！正確答案：${ansStr}`);
    showSolution(q);
  }

  pvpUpdateHpDisplay();

  if(s.myHp <= 0) {
    mqttSend({ type:'end', iWon: false });
    setTimeout(()=>pvpEndGame(false), 1000);
    return;
  }
  if(s.opHp <= 0) {
    mqttSend({ type:'end', iWon: true });
    setTimeout(()=>pvpEndGame(true), 1000);
    return;
  }

  const area = document.getElementById('resultArea');
  if(area) {
    area.innerHTML += `<div class="btn-row" style="margin-top:12px"><button class="btn btn-next" onclick="pvpRequestNext()">&#x27A1; 下一回合</button></div>`;
  }
}

function pvpHint(){ if(!pvpState.answered) showResult('hint', pvpState.currentQuestion.hint); }

function pvpRequestNext() {
  pvpNewRound();
}

function pvpEndGame(won) {
  spawnConfetti();
  const s = pvpState;
  document.getElementById('app').innerHTML = `
    <div class="end-screen"><div class="end-card">
      <div class="end-icon">${won?'&#x1F3C6;':'&#x1F4A5;'}</div>
      <h2>${won?'你贏了！':'你輸了...'}</h2>
      <p>共進行 ${s.round} 回合</p>
      <p>你答對 ${s.myCorrect} 題 / 對手答對 ${s.opCorrect} 題</p>
      <div class="btn-row" style="justify-content:center;margin-top:20px">
        <button class="btn btn-back" onclick="pvpCleanup();showModeSelect()">&#x1F3E0; 回主選單</button>
      </div>
    </div></div>`;
}

function pvpDisconnected() {
  if(pvpState && pvpState.round > 0) {
    pvpEndGame(true);
  }
}
