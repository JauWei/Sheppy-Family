<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>家庭首頁</title>
<!-- Supabase JS SDK -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background-color: #1a1a2e;
    background-size: cover;
    background-position: center;
    background-attachment: fixed;
    font-family: 'Microsoft JhengHei', 'Segoe UI', sans-serif;
    color: #fff;
    overflow-x: hidden;
  }

  /* 頂部區域 */
  .header {
    text-align: center;
    padding: 40px 20px 20px;
    width: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
    position: relative;
  }
  .header h1 {
    text-shadow: 2px 2px 8px rgba(0,0,0,0.7);
    letter-spacing: 4px;
    cursor: pointer;
    display: inline-block;
  }
  .header h1:hover { opacity: 0.85; }
  .clock {
    font-size: 1.1rem;
    opacity: 0.7;
    margin-top: 4px;
  }

  /* 同步狀態指示器 */
  .sync-indicator {
    position: fixed;
    bottom: 16px;
    right: 16px;
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 0.8rem;
    z-index: 100;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
  }
  .sync-indicator.hidden { opacity: 0; transform: translateY(10px); }
  .sync-indicator.syncing { background: rgba(52,152,219,0.8); }
  .sync-indicator.synced { background: rgba(46,204,113,0.8); }
  .sync-indicator.error { background: rgba(231,76,60,0.8); }

  /* 工具列 */
  .toolbar {
    position: fixed;
    top: 16px;
    right: 16px;
    display: flex;
    gap: 8px;
    z-index: 100;
  }
  .toolbar button {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: none;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    color: #fff;
    font-size: 20px;
    cursor: pointer;
    transition: background 0.3s;
  }
  .toolbar button:hover { background: rgba(255,255,255,0.3); }
  .toolbar button.active { background: rgba(108,99,255,0.6); }

  /* 連結容器 - 自由定位模式 */
  .links-container {
    position: relative;
    width: 100%;
    min-height: calc(100vh - 140px);
    padding: 20px;
  }

  /* 自動排列模式 */
  .links-container.grid-mode {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: flex-start;
    align-content: flex-start;
    gap: 28px;
    padding: 40px 24px;
  }
  .links-container.grid-mode .link-card {
    position: relative !important;
    left: auto !important;
    top: auto !important;
  }

  /* 連結卡片 */
  .link-card {
    position: absolute;
    cursor: pointer;
    transition: filter 0.25s, box-shadow 0.25s;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    user-select: none;
  }
  .link-card:hover { filter: brightness(1.1); }
  .link-card.dragging {
    opacity: 0.8;
    z-index: 50;
    transition: none;
    cursor: grabbing;
  }

  .link-card .card-img-wrap {
    width: 100%;
    height: 100%;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(6px);
    position: relative;
  }
  .link-card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    pointer-events: none;
  }
  .link-card .card-label {
    margin-top: 6px;
    text-align: center;
    font-size: 0.9rem;
    font-weight: bold;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.8);
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .link-card .card-edit-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    border: none;
    background: rgba(0,0,0,0.55);
    color: #fff;
    font-size: 14px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  .link-card:hover .card-edit-btn { display: flex; }

  /* 形狀 */
  .shape-rectangle .card-img-wrap { border-radius: 12px; }
  .shape-circle .card-img-wrap { border-radius: 50%; }
  .shape-rounded .card-img-wrap { border-radius: 24px; }
  .shape-flower .card-img-wrap {
    clip-path: polygon(50% 0%, 63% 10%, 80% 2%, 82% 20%, 98% 27%, 90% 42%, 100% 58%, 88% 65%, 93% 82%, 77% 80%, 68% 95%, 55% 85%, 42% 97%, 33% 84%, 18% 92%, 17% 76%, 2% 68%, 12% 55%, 0% 40%, 13% 32%, 5% 17%, 22% 17%, 30% 2%, 40% 14%);
    border-radius: 0;
  }
  .shape-star .card-img-wrap {
    clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
    border-radius: 0;
  }
  .shape-heart .card-img-wrap {
    clip-path: url(#heartClip);
    border-radius: 0;
  }
  .shape-hexagon .card-img-wrap {
    clip-path: polygon(25% 0%, 75% 0%, 100% 50%, 75% 100%, 25% 100%, 0% 50%);
    border-radius: 0;
  }
  .shape-diamond .card-img-wrap {
    clip-path: polygon(50% 0%, 100% 50%, 50% 100%, 0% 50%);
    border-radius: 0;
  }

  /* 邊框 */
  .border-none .card-img-wrap { border: none; }
  .border-thin .card-img-wrap { border: 2px solid #fff; }
  .border-medium .card-img-wrap { border: 4px solid #fff; }
  .border-thick .card-img-wrap { border: 6px solid #fff; }
  .border-gold .card-img-wrap { border: 4px solid #ffd700; box-shadow: 0 0 12px rgba(255,215,0,0.4); }
  .border-rainbow .card-img-wrap { border: 4px solid transparent; background-clip: padding-box; box-shadow: 0 0 0 4px #ff6b6b, 0 0 0 8px #ffd93d, 0 0 0 12px #6bcb77; }
  .border-glow .card-img-wrap { border: 3px solid rgba(108,99,255,0.8); box-shadow: 0 0 16px rgba(108,99,255,0.5), 0 0 32px rgba(108,99,255,0.2); }
  .border-shadow .card-img-wrap { border: none; box-shadow: 0 8px 32px rgba(0,0,0,0.6); }
  .border-dashed .card-img-wrap { border: 3px dashed #fff; }
  .border-double .card-img-wrap { border: 6px double #fff; }

  /* 新增按鈕 */
  .add-card {
    width: 120px;
    height: 90px;
    border-radius: 16px;
    border: 3px dashed rgba(255,255,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 2.5rem;
    color: rgba(255,255,255,0.4);
    transition: border-color 0.3s, color 0.3s;
    background: rgba(255,255,255,0.04);
  }
  .add-card:hover { border-color: rgba(255,255,255,0.6); color: rgba(255,255,255,0.7); }

  /* 彈窗 */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
    overflow-y: auto;
    padding: 20px;
  }
  .modal-overlay.active { display: flex; }

  .modal {
    background: #2a2a40;
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 480px;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: 0 12px 40px rgba(0,0,0,0.5);
  }
  .modal h2 { margin-bottom: 20px; font-size: 1.3rem; }
  .modal label { display: block; margin-bottom: 6px; font-size: 0.9rem; opacity: 0.8; }
  .modal input[type="text"],
  .modal input[type="url"],
  .modal input[type="number"],
  .modal select {
    width: 100%;
    padding: 10px 12px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 0.95rem;
    margin-bottom: 16px;
    outline: none;
  }
  .modal select option { background: #2a2a40; color: #fff; }
  .modal input:focus, .modal select:focus { border-color: #6c63ff; }

  .modal input[type="color"] {
    width: 60px;
    height: 36px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: transparent;
    padding: 0;
  }

  .modal .file-pick { margin-bottom: 16px; }
  .modal .file-pick input[type="file"] { display: none; }
  .modal .file-pick .pick-btn {
    display: inline-block;
    padding: 8px 16px;
    background: #6c63ff;
    border: none;
    border-radius: 8px;
    color: #fff;
    cursor: pointer;
    font-size: 0.9rem;
    transition: background 0.3s;
  }
  .modal .file-pick .pick-btn:hover { background: #5a52d5; }
  .modal .file-pick .file-name { margin-left: 10px; font-size: 0.85rem; opacity: 0.7; }

  .modal .preview-img {
    width: 100%;
    max-height: 140px;
    object-fit: cover;
    border-radius: 8px;
    margin-bottom: 16px;
    display: none;
  }

  .row { display: flex; gap: 12px; align-items: flex-end; }
  .row > * { flex: 1; }

  .shape-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .shape-opt {
    width: 50px;
    height: 50px;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.3s;
    flex-direction: column;
  }
  .shape-opt:hover { border-color: rgba(255,255,255,0.4); }
  .shape-opt.selected { border-color: #6c63ff; background: rgba(108,99,255,0.15); }
  .shape-opt svg { width: 28px; height: 28px; fill: #fff; }
  .shape-opt span { font-size: 0.6rem; margin-top: 2px; opacity: 0.7; }

  .border-options {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
  }
  .border-opt {
    padding: 6px 12px;
    border-radius: 8px;
    border: 2px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.06);
    cursor: pointer;
    font-size: 0.8rem;
    color: #fff;
    transition: border-color 0.3s;
  }
  .border-opt:hover { border-color: rgba(255,255,255,0.4); }
  .border-opt.selected { border-color: #6c63ff; background: rgba(108,99,255,0.15); }

  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    flex-wrap: wrap;
  }
  .modal-actions button {
    padding: 10px 22px;
    border: none;
    border-radius: 8px;
    font-size: 0.95rem;
    cursor: pointer;
    transition: background 0.3s;
  }
  .btn-cancel { background: rgba(255,255,255,0.1); color: #fff; }
  .btn-cancel:hover { background: rgba(255,255,255,0.2); }
  .btn-save { background: #6c63ff; color: #fff; }
  .btn-save:hover { background: #5a52d5; }
  .btn-delete { background: #e74c3c; color: #fff; }
  .btn-delete:hover { background: #c0392b; }

  .range-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .range-row input[type="range"] { flex: 1; accent-color: #6c63ff; }
  .range-row .range-val { min-width: 40px; text-align: center; font-size: 0.9rem; }

  /* ========== 留言板 ========== */
  .msgboard-panel {
    position: fixed;
    top: 0; right: -520px;
    width: 500px; max-width: 94vw;
    height: 100vh;
    background: rgba(26,26,46,0.97);
    backdrop-filter: blur(16px);
    z-index: 150;
    display: flex;
    flex-direction: column;
    box-shadow: -6px 0 30px rgba(0,0,0,0.5);
    transition: right 0.35s cubic-bezier(.4,0,.2,1);
  }
  .msgboard-panel.open { right: 0; }

  .msgboard-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    flex-shrink: 0;
  }
  .msgboard-header h2 { font-size: 1.2rem; margin: 0; }
  .msgboard-close {
    width: 36px; height: 36px;
    border-radius: 50%; border: none;
    background: rgba(255,255,255,0.1);
    color: #fff; font-size: 20px;
    cursor: pointer;
  }
  .msgboard-close:hover { background: rgba(255,255,255,0.2); }

  .members-bar {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .members-bar .member-chip {
    padding: 4px 10px;
    border-radius: 12px;
    background: rgba(108,99,255,0.2);
    font-size: 0.8rem;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .members-bar .member-chip .remove-member {
    cursor: pointer; opacity: 0.5; font-size: 0.7rem;
  }
  .members-bar .member-chip .remove-member:hover { opacity: 1; }
  .members-bar .add-member-btn {
    padding: 4px 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.08);
    border: 1px dashed rgba(255,255,255,0.2);
    color: #fff;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .members-bar .add-member-btn:hover { background: rgba(255,255,255,0.15); }

  .msg-filter-bar {
    display: flex;
    gap: 8px;
    padding: 10px 20px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    flex-shrink: 0;
    align-items: center;
    font-size: 0.85rem;
  }
  .msg-filter-bar select {
    padding: 4px 8px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
    color: #fff;
    font-size: 0.8rem;
  }
  .msg-filter-bar select option { background: #2a2a40; }
  .msg-filter-bar .filter-label { opacity: 0.6; }
  .msg-pin-toggle {
    margin-left: auto;
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 0.8rem;
    cursor: pointer;
  }
  .msg-pin-toggle.active { background: rgba(255,193,7,0.2); border-color: #ffc107; }

  .msg-list {
    flex: 1;
    overflow-y: auto;
    padding: 14px 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .msg-list::-webkit-scrollbar { width: 5px; }
  .msg-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  .msg-item {
    border-radius: 14px;
    padding: 14px;
    position: relative;
    transition: transform 0.2s;
  }
  .msg-item:hover { transform: translateX(-2px); }
  .msg-item.pinned { border-left: 3px solid #ffc107; }

  .msg-mood-default { background: rgba(255,255,255,0.06); }
  .msg-mood-happy { background: rgba(255,193,7,0.12); }
  .msg-mood-love { background: rgba(233,30,99,0.12); }
  .msg-mood-sad { background: rgba(33,150,243,0.12); }
  .msg-mood-angry { background: rgba(244,67,54,0.12); }
  .msg-mood-excited { background: rgba(76,175,80,0.12); }

  .msg-top-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 6px;
    flex-wrap: wrap;
  }
  .msg-author { font-weight: bold; font-size: 0.95rem; }
  .msg-arrow { opacity: 0.4; font-size: 0.85rem; }
  .msg-to { font-size: 0.9rem; opacity: 0.8; }
  .msg-date { margin-left: auto; font-size: 0.75rem; opacity: 0.45; white-space: nowrap; }

  .msg-body { font-size: 0.95rem; line-height: 1.6; margin-bottom: 8px; word-break: break-word; }

  .msg-photo {
    max-width: 100%;
    max-height: 200px;
    border-radius: 10px;
    margin-bottom: 8px;
    cursor: pointer;
    object-fit: cover;
  }
  .msg-photo:hover { opacity: 0.9; }

  .msg-bottom-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .msg-react-btn {
    padding: 3px 8px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: #fff;
    font-size: 0.8rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .msg-react-btn:hover { background: rgba(255,255,255,0.12); }
  .msg-react-btn.reacted { background: rgba(108,99,255,0.2); border-color: rgba(108,99,255,0.4); }

  .msg-actions { margin-left: auto; display: flex; gap: 4px; }
  .msg-act-btn {
    padding: 3px 8px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: #fff;
    font-size: 0.8rem;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .msg-item:hover .msg-act-btn { opacity: 0.5; }
  .msg-act-btn:hover { opacity: 1 !important; background: rgba(255,255,255,0.1); }

  .msg-replies {
    margin-top: 10px;
    padding-left: 14px;
    border-left: 2px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .msg-reply {
    background: rgba(255,255,255,0.04);
    border-radius: 10px;
    padding: 8px 12px;
    font-size: 0.88rem;
  }
  .reply-top { display: flex; gap: 6px; align-items: center; margin-bottom: 3px; }
  .reply-author { font-weight: bold; font-size: 0.85rem; }
  .reply-date { font-size: 0.7rem; opacity: 0.4; margin-left: auto; }
  .reply-body { line-height: 1.5; word-break: break-word; }

  .reply-input-row { display: flex; gap: 6px; margin-top: 6px; }
  .reply-input-row input {
    flex: 1;
    padding: 6px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 0.85rem;
    outline: none;
  }
  .reply-input-row button {
    padding: 6px 12px;
    border-radius: 8px;
    border: none;
    background: #6c63ff;
    color: #fff;
    font-size: 0.82rem;
    cursor: pointer;
  }

  .msg-compose {
    border-top: 1px solid rgba(255,255,255,0.1);
    padding: 14px 20px;
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 10px;
    background: rgba(0,0,0,0.2);
  }
  .compose-row { display: flex; gap: 8px; align-items: center; }
  .compose-row select, .compose-row input {
    padding: 7px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 0.88rem;
    outline: none;
  }
  .compose-row select { max-width: 120px; }
  .compose-row select option { background: #2a2a40; }
  .compose-row input { flex: 1; }

  .compose-text-wrap { position: relative; }
  .compose-textarea {
    width: 100%;
    min-height: 60px;
    max-height: 120px;
    padding: 10px 12px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: #fff;
    font-size: 0.95rem;
    resize: vertical;
    outline: none;
    font-family: inherit;
  }
  .compose-textarea:focus { border-color: #6c63ff; }

  .compose-tools { display: flex; gap: 6px; align-items: center; }
  .compose-tool-btn {
    padding: 5px 10px;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: #fff;
    font-size: 0.88rem;
    cursor: pointer;
    transition: background 0.2s;
  }
  .compose-tool-btn:hover { background: rgba(255,255,255,0.12); }

  .compose-photo-preview {
    max-height: 80px;
    border-radius: 8px;
    display: none;
    position: relative;
  }
  .compose-photo-preview img { max-height: 80px; border-radius: 8px; }
  .compose-photo-remove {
    position: absolute;
    top: -6px; right: -6px;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: none;
    background: #e74c3c;
    color: #fff;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .compose-send-row { display: flex; gap: 8px; align-items: center; justify-content: flex-end; }
  .mood-select { display: flex; gap: 4px; }
  .mood-opt {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid transparent;
    cursor: pointer;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.2s;
  }
  .mood-opt:hover { border-color: rgba(255,255,255,0.3); }
  .mood-opt.selected { border-color: #6c63ff; }

  .send-btn {
    padding: 8px 20px;

<script>
// ================================================================
//  Supabase 設定 — 請填入你自己的值
// ================================================================
const SUPABASE_URL = 'https://bpvybuvjbdfgrjgwiqkb.supabase.co';       // 例如: https://xxxxx.supabase.co
const SUPABASE_ANON_KEY = 'sb_publishable_QTmYQiv9MhpsYzlEhWsVOg_38OXHLMF';
const STORAGE_BUCKET = 'family-photos';          // Supabase Storage bucket 名稱

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ================================================================
//  同步狀態指示器
// ================================================================
function showSync(type, text) {
  const el = document.getElementById('syncIndicator');
  el.className = `sync-indicator ${type}`;
  el.textContent = text;
  if (type === 'synced') setTimeout(() => el.classList.add('hidden'), 1500);
}

// ================================================================
//  Supabase Storage 工具 — 上傳圖片（取代 Base64）
// ================================================================
async function uploadImage(file, folder) {
  const ext = file.name.split('.').pop();
  const filename = `${folder}/${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;

  // 壓縮圖片（限制最大 800px 寬度）
  const compressed = await compressImage(file, 800, 0.8);

  const { data, error } = await sb.storage
    .from(STORAGE_BUCKET)
    .upload(filename, compressed, { contentType: compressed.type, upsert: false });

  if (error) throw error;

  const { data: urlData } = sb.storage.from(STORAGE_BUCKET).getPublicUrl(filename);
  return urlData.publicUrl;
}

function compressImage(file, maxWidth, quality) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
      canvas.width = w;
      canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => resolve(blob), 'image/webp', quality);
    };
    img.src = URL.createObjectURL(file);
  });
}

async function deleteStorageFile(publicUrl) {
  if (!publicUrl || !publicUrl.includes(STORAGE_BUCKET)) return;
  try {
    const path = publicUrl.split(`${STORAGE_BUCKET}/`)[1];
    if (path) await sb.storage.from(STORAGE_BUCKET).remove([path]);
  } catch (e) { console.warn('刪除檔案失敗:', e); }
}

// ================================================================
//  資料管理 — 全部透過 Supabase
// ================================================================

// 本地快取
let appSettings = { bg_image: '', title_text: '我的家庭首頁', title_font: "'Microsoft JhengHei', sans-serif", title_size: 40, title_color: '#ffffff', grid_mode: false };
let appLinks = [];
let appMembers = [];
let appMessages = [];

// --- 載入全部資料 ---
async function loadAllData() {
  showSync('syncing', '同步中...');
  try {
    const [settingsRes, linksRes, membersRes, messagesRes] = await Promise.all([
      sb.from('settings').select('*').limit(1).single(),
      sb.from('links').select('*').order('sort_order', { ascending: true }),
      sb.from('members').select('*').order('created_at', { ascending: true }),
      sb.from('messages').select('*').order('created_at', { ascending: false }),
    ]);

    if (settingsRes.data) appSettings = settingsRes.data;
    if (linksRes.data) appLinks = linksRes.data;
    if (membersRes.data) appMembers = membersRes.data;
    if (messagesRes.data) appMessages = messagesRes.data;

    // 如果 settings 不存在，建立預設
    if (!settingsRes.data && !settingsRes.error?.code === 'PGRST116') {

  } catch (e) {
    console.error('載入資料失敗:', e);
    showSync('error', '同步失敗');

}

// ================================================================
//  Supabase Realtime — 即時同步
// ================================================================
function setupRealtime() {
  const channel = sb.channel('family-home-sync');

  channel.on('postgres_changes', { event: '*', schema: 'public', table: 'settings' }, (payload) => {
    if (payload.new) { appSettings = payload.new; applyBg(); applyTitle(); }
  });

  channel.on('postgres_changes', { event: '*', schema: 'public', table: 'links' }, async () => {
    const { data } = await sb.from('links').select('*').order('sort_order', { ascending: true });
    if (data) { appLinks = data; renderLinks(); }
    showSync('synced', '即時更新 ✓');
  });

  channel.on('postgres_changes', { event: '*', schema: 'public', table: 'members' }, async () => {
    const { data } = await sb.from('members').select('*').order('created_at', { ascending: true });
    if (data) { appMembers = data; renderMembers(); populateMemberSelects(); }
  });

  channel.on('postgres_changes', { event: '*', schema: 'public', table: 'messages' }, async () => {
    const { data } = await sb.from('messages').select('*').order('created_at', { ascending: false });
    if (data) { appMessages = data; renderMessages(); }
    showSync('synced', '即時更新 ✓');
  });

  channel.subscribe((status) => {
    if (status === 'SUBSCRIBED') console.log('Realtime 已連線');
  });
}

// ================================================================
//  拖曳

let dragState = null;
let justDragged = false;

function onDragStart(e, index) {
  if (e.target.closest('.card-edit-btn')) return;
  // 手機上強制 grid mode，不啟用拖曳，讓 click/tap 正常運作
  if (appSettings.grid_mode || isMobile()) return;
  e.preventDefault();
  const card = e.currentTarget;
  const rect = card.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  justDragged = false;
  dragState = { index, card, offsetX: clientX - rect.left, offsetY: clientY - rect.top, startX: clientX, startY: clientY, moved: false };
  card.classList.add('dragging');
}

function onDragMove(e) {
  if (!dragState) return;
  e.preventDefault();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  if (Math.abs(clientX - dragState.startX) > 4 || Math.abs(clientY - dragState.startY) > 4) dragState.moved = true;
  const cRect = document.getElementById('linksContainer').getBoundingClientRect();
  let x = Math.max(0, Math.min(clientX - cRect.left - dragState.offsetX, cRect.width - 60));
  let y = Math.max(0, clientY - cRect.top - dragState.offsetY);
  dragState.card.style.left = x + 'px';
  dragState.card.style.top = y + 'px';
}

function onDragEnd() {
  if (!dragState) return;
  dragState.card.classList.remove('dragging');
  if (dragState.moved) {
    justDragged = true;
    const link = appLinks[dragState.index];
    if (link) {
      const x = parseInt(dragState.card.style.left);
      const y = parseInt(dragState.card.style.top);
      updateLink(link.id, { pos_x: x, pos_y: y });
    }
  }
  dragState = null;
}

document.addEventListener('mousemove', onDragMove);
document.addEventListener('mouseup', onDragEnd);
document.addEventListener('touchmove', onDragMove, { passive: false });
document.addEventListener('touchend', onDragEnd);

// ================================================================
//  連結卡片渲染
// ================================================================
function isMobile() { return window.innerWidth <= 480; }

function renderLinks() {
  const container = document.getElementById('linksContainer');
  container.innerHTML = '';
  const mobile = isMobile();
  container.classList.toggle('grid-mode', !!appSettings.grid_mode || mobile);

  appLinks.forEach((link, i) => {
    const card = document.createElement('div');
    let s = link.card_size || 150;
    if (mobile) s = Math.min(s, Math.floor((window.innerWidth - 60) / 2));
    const isCircular = ['circle','flower','star','heart','hexagon','diamond'].includes(link.shape);
    const w = isCircular ? s : Math.round(s * 4 / 3);
    const h = s;

    card.className = `link-card shape-${link.shape || 'rounded'} border-${link.border_style || 'none'}`;
    card.style.width = w + 'px';
    card.style.height = (h + 24) + 'px';

    if (!appSettings.grid_mode && !mobile) {
      card.style.left = (link.pos_x || 0) + 'px';
      card.style.top = (link.pos_y || 0) + 'px';
    }

    const wrap = document.createElement('div');
    wrap.className = 'card-img-wrap';
    wrap.style.width = w + 'px';
    wrap.style.height = h + 'px';

    const img = document.createElement('img');
    img.src = link.image_url || '';
    img.alt = link.name;
    img.onerror = function() { this.style.display = 'none'; };
    wrap.appendChild(img);

    const editBtn = document.createElement('button');
    editBtn.className = 'card-edit-btn';
    editBtn.innerHTML = '✎';
    editBtn.title = '編輯';
    editBtn.onclick = (e) => { e.stopPropagation(); openLinkModal(i); };
    wrap.appendChild(editBtn);

    card.appendChild(wrap);

    const label = document.createElement('div');
    label.className = 'card-label';
    label.textContent = link.name;
    label.style.width = w + 'px';
    card.appendChild(label);

    card.addEventListener('mousedown', (e) => onDragStart(e, i));
    card.addEventListener('touchstart', (e) => onDragStart(e, i), { passive: true });

    // 手機上用 touchend 偵測 tap，桌面用 click
    card.addEventListener('touchend', (e) => {
      if (e.target.closest('.card-edit-btn')) return;
      if (justDragged) { justDragged = false; return; }
      // 沒有拖曳過 → 視為點擊
      if (!dragState || !dragState.moved) {
        window.open(link.url, '_blank');
      }
    });
    card.addEventListener('click', (e) => {
      if (e.target.closest('.card-edit-btn')) return;
      if (justDragged) { justDragged = false; return; }
      window.open(link.url, '_blank');
    });

    container.appendChild(card);
  });

  // 新增按鈕
  const addBtn = document.createElement('div');
  addBtn.className = 'add-card';
  if (!appSettings.grid_mode && !mobile) {
    addBtn.style.position = 'absolute';
    const lastLink = appLinks[appLinks.length - 1];
    if (lastLink) {
      const isC = ['circle','flower','star','heart','hexagon','diamond'].includes(lastLink.shape);
      const lw = isC ? (lastLink.card_size || 150) : Math.round((lastLink.card_size || 150) * 4 / 3);
      addBtn.style.left = ((lastLink.pos_x || 0) + lw + 30) + 'px';
      addBtn.style.top = (lastLink.pos_y || 0) + 'px';
    } else { addBtn.style.left = '80px'; addBtn.style.top = '20px'; }
  }
  addBtn.innerHTML = '+';
  addBtn.title = '新增連結';
  addBtn.onclick = () => openLinkModal(-1);
  container.appendChild(addBtn);
}

async function saveLink() {
  const name = document.getElementById('linkName').value.trim();
  const url = document.getElementById('linkUrl').value.trim();
  const imgUrlInput = document.getElementById('linkImgUrl').value.trim();
  const fileInput = document.getElementById('linkFileInput');
  const size = parseInt(document.getElementById('linkSize').value) || 150;

  if (!name || !url) { alert('請填寫名稱和連結網址'); return; }

  let imageUrl = imgUrlInput;

  // 如果有選擇本地檔案，上傳到 Supabase Storage
  if (fileInput.files[0]) {
    try {
      imageUrl = await uploadImage(fileInput.files[0], 'link-icons');
    } catch (e) { alert('圖片上傳失敗：' + e.message); return; }
  }

  if (editingIndex === -1) {
    // 新增
    let newX = 80, newY = 20;
    if (appLinks.length > 0) {
      const last = appLinks[appLinks.length - 1];
      const isC = ['circle','flower','star','heart','hexagon','diamond'].includes(last.shape);
      const lw = isC ? (last.card_size || 150) : Math.round((last.card_size || 150) * 4 / 3);
      newX = (last.pos_x || 0) + lw + 30;
      newY = last.pos_y || 0;
      if (newX > 900) { newX = 80; newY = (last.pos_y || 0) + (last.card_size || 150) + 60; }
    }
    await addLink({ name, url, image_url: imageUrl, shape: selectedShape, border_style: selectedBorder, card_size: size, pos_x: newX, pos_y: newY });
  } else {
    const old = appLinks[editingIndex];
    await updateLink(old.id, { name, url, image_url: imageUrl || old.image_url, shape: selectedShape, border_style: selectedBorder, card_size: size });
  }
  closeModal('linkModal');
}

  if (!confirm('確定要刪除此連結嗎？')) return;
  await removeLinkById(appLinks[editingIndex].id);
  closeModal('linkModal');
}

function initEmojiPanel() {
  const tabs = document.getElementById('emojiTabs');
  const cats = Object.keys(emojiCategories);
  tabs.innerHTML = '';
  cats.forEach((cat, i) => {
    const btn = document.createElement('button');
    btn.className = 'emoji-tab' + (i === 0 ? ' active' : '');
    btn.textContent = cat.split(' ')[0];
    btn.title = cat;
    btn.onclick = () => {
      tabs.querySelectorAll('.emoji-tab').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      renderEmojiGrid(cat);
    };
    tabs.appendChild(btn);
  });
  renderEmojiGrid(cats[0]);
}

function renderEmojiGrid(cat) {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  emojiCategories[cat].forEach(em => {
    const cell = document.createElement('span');
    cell.className = 'emoji-cell';
    cell.textContent = em;
    cell.onclick = () => {
      const ta = document.getElementById('composeText');
      const pos = ta.selectionStart;
      ta.value = ta.value.slice(0, pos) + em + ta.value.slice(pos);
      ta.focus();
      ta.selectionStart = ta.selectionEnd = pos + em.length;
    };
    grid.appendChild(cell);
  });
}

function toggleEmojiPanel() { document.getElementById('emojiPanel').classList.toggle('open'); }

document.addEventListener('click', e => {
  const panel = document.getElementById('emojiPanel');
  if (!panel.classList.contains('open')) return;
  if (e.target.closest('.emoji-panel') || e.target.closest('.compose-tool-btn')) return;
  panel.classList.remove('open');
});

initEmojiPanel();

// --- 送出留言 ---
async function sendMessage() {
  const from = document.getElementById('composeFrom').value;
  const to = document.getElementById('composeTo').value;
  const text = document.getElementById('composeText').value.trim();
  if (!from) { alert('請選擇你是誰'); return; }
  if (!text && !composePhotoFile) { alert('請輸入留言內容或附加照片'); return; }

  let photoUrl = '';
  if (composePhotoFile) {
    try {
      photoUrl = await uploadImage(composePhotoFile, 'messages');
    } catch (e) { alert('照片上傳失敗：' + e.message); return; }
  }

  await addMessage({
    sender: from,
    recipient: to || '',
    body: text,
    photo_url: photoUrl,
    mood: selectedMood,
    pinned: false,
    reactions: {},
    replies: []
  });

  // Reset
  document.getElementById('composeText').value = '';
  removeComposePhoto();
  selectedMood = 'default';
  document.querySelectorAll('.mood-opt').forEach(e => e.classList.toggle('selected', e.dataset.mood === 'default'));
}

// --- 渲染留言列表 ---
function renderMessages() {
  const list = document.getElementById('msgList');
  list.innerHTML = '';

  const filterFrom = document.getElementById('msgFilterFrom').value;
  const filterTo = document.getElementById('msgFilterTo').value;

  let msgs = appMessages.filter(m => {
    if (msgFilterPinned && !m.pinned) return false;
    if (filterFrom && m.sender !== filterFrom) return false;
    if (filterTo && m.recipient !== filterTo) return false;
    return true;
  });

  msgs.sort((a, b) => {
    if (a.pinned && !b.pinned) return -1;
    if (!a.pinned && b.pinned) return 1;
    return 0;
  });

  if (msgs.length === 0) {
    list.innerHTML = '<div class="msg-empty">還沒有留言，快來寫下第一則吧！</div>';
    return;
  }

  msgs.forEach(msg => {
    const el = document.createElement('div');
    el.className = `msg-item msg-mood-${msg.mood || 'default'}${msg.pinned ? ' pinned' : ''}`;
    const dateStr = formatMsgDate(msg.created_at);

    let html = `<div class="msg-top-row"><span class="msg-author">${esc(msg.sender)}</span>`;
    html += `<span class="msg-arrow">→</span><span class="msg-to">${msg.recipient ? esc(msg.recipient) : '大家'}</span>`;
    html += `<span class="msg-date">${dateStr}</span></div>`;

    if (msg.body) html += `<div class="msg-body">${esc(msg.body).replace(/\n/g, '<br>')}</div>`;
    if (msg.photo_url) html += `<img class="msg-photo" src="${esc(msg.photo_url)}" onclick="openLightbox(this.src)">`;

    const reactionEmojis = ['👍','❤️','😂','😮','😢','🎉'];
    html += `<div class="msg-bottom-row">`;
    reactionEmojis.forEach(em => {
      const count = (msg.reactions && msg.reactions[em]) || 0;
      html += `<button class="msg-react-btn${count > 0 ? ' reacted' : ''}" onclick="toggleReaction('${msg.id}','${em}')">${em}${count > 0 ? ' ' + count : ''}</button>`;
    });
    html += `<div class="msg-actions">
      <button class="msg-act-btn" onclick="togglePin('${msg.id}')" title="${msg.pinned ? '取消置頂' : '置頂'}">📌</button>
      <button class="msg-act-btn" onclick="deleteMsg('${msg.id}')" title="刪除">🗑️</button>
    </div></div>`;

    // Replies
    const replies = msg.replies || [];
    if (replies.length > 0) {
      html += `<div class="msg-replies">`;
      replies.forEach(r => {
        html += `<div class="msg-reply">
          <div class="reply-top"><span class="reply-author">${esc(r.from)}</span><span class="reply-date">${formatMsgDate(r.date)}</span></div>
          <div class="reply-body">${esc(r.text).replace(/\n/g, '<br>')}</div>
        </div>`;
      });
      html += `</div>`;
    }

    html += `<div class="reply-input-row">
      <input type="text" placeholder="回覆..." onkeydown="if(event.key==='Enter')replyToMsg('${msg.id}',this)">
      <button onclick="replyToMsg('${msg.id}',this.previousElementSibling)">回覆</button>
    </div>`;

    el.innerHTML = html;
    list.appendChild(el);
  });
}

function formatMsgDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  const diffMin = Math.floor((Date.now() - d) / 60000);
  if (diffMin < 1) return '剛剛';
  if (diffMin < 60) return diffMin + ' 分鐘前';
  const diffHr = Math.floor(diffMin / 60);
  if (diffHr < 24) return diffHr + ' 小時前';
  const diffDay = Math.floor(diffHr / 24);
  if (diffDay < 7) return diffDay + ' 天前';
  return d.toLocaleDateString('zh-TW', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// --- 互動功能 ---
async function toggleReaction(msgId, emoji) {
  const msg = appMessages.find(m => m.id === msgId);
  if (!msg) return;
  const reactions = { ...(msg.reactions || {}) };
  reactions[emoji] = (reactions[emoji] || 0) + 1;
  await updateMessage(msgId, { reactions });
}

async function togglePin(msgId) {
  const msg = appMessages.find(m => m.id === msgId);
  if (!msg) return;
  await updateMessage(msgId, { pinned: !msg.pinned });
}

async function deleteMsg(msgId) {
  if (!confirm('確定要刪除此留言嗎？')) return;
  await deleteMessageById(msgId);
}

async function replyToMsg(msgId, input) {
  const text = input.value.trim();
  if (!text) return;
  const from = document.getElementById('composeFrom').value;
  if (!from) { alert('請先在下方選擇你是誰'); return; }
  const msg = appMessages.find(m => m.id === msgId);
  if (!msg) return;
  const replies = [...(msg.replies || []), { from, text, date: new Date().toISOString() }];
  await updateMessage(msgId, { replies });
  input.value = '';
}

function openLightbox(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('open');
}
