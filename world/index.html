<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Travel Pin Map - 旅行地圖</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<style>
:root {
  --primary: #4F46E5;
  --primary-light: #818CF8;
  --bg: #F8FAFC;
  --card-bg: #FFFFFF;
  --text: #1E293B;
  --text-light: #64748B;
  --border: #E2E8F0;
  --danger: #EF4444;
  --success: #22C55E;
  --warning: #F59E0B;
  --radius: 12px;
  --shadow: 0 4px 24px rgba(0,0,0,0.10);
  --topbar-h: 52px;
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  /* iOS Safari 100vh fix */
  position: fixed;
  width: 100%;
}

/* ===== TOP BAR ===== */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  background: var(--card-bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 12px; height: var(--topbar-h);
  padding-top: var(--safe-top);
  box-shadow: 0 1px 8px rgba(0,0,0,0.06);
}
.topbar-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
.topbar h1 {
  font-size: 18px; font-weight: 700;
  background: linear-gradient(135deg, var(--primary), #EC4899);
  -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent;
  white-space: nowrap;
}
.topbar-actions { display: flex; gap: 6px; align-items: center; flex-shrink: 0; }

.btn {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  border: 1px solid var(--border); background: var(--card-bg);
  color: var(--text); transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover { background: #F1F5F9; }
.btn:active { transform: scale(0.96); }
.btn-primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn-primary:hover { background: #4338CA; }
.btn-danger { background: var(--danger); color: #fff; border-color: var(--danger); }
.btn-danger:hover { background: #DC2626; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn .btn-label { display: inline; }

/* ===== AUTH PANEL ===== */
.auth-panel {
  position: fixed; top: var(--topbar-h); right: 0; z-index: 999;
  background: var(--card-bg); border-left: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  border-radius: 0 0 0 var(--radius);
  padding: 20px; width: 300px; max-width: 90vw;
  box-shadow: var(--shadow);
  display: none;
}
.auth-panel.open { display: block; }
.auth-panel h3 { margin-bottom: 12px; font-size: 16px; }
.auth-panel input {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 16px; margin-bottom: 10px;
  /* prevent iOS zoom on focus */
  -webkit-appearance: none;
}
.auth-panel input:focus { outline: none; border-color: var(--primary); }
.auth-actions { display: flex; gap: 8px; }
.auth-actions .btn { flex: 1; justify-content: center; }
.user-info { font-size: 13px; color: var(--text-light); }

/* ===== MAP ===== */
#map {
  position: fixed;
  top: var(--topbar-h);
  left: 0; right: 0; bottom: 0;
  z-index: 1;
  /* iOS touch fix */
  touch-action: manipulation;
}
/* Fix Leaflet touch on iOS */
.leaflet-container {
  touch-action: manipulation;
  -webkit-touch-callout: none;
}
.leaflet-tile-pane { touch-action: manipulation; }

/* ===== SIDEBAR ===== */
.sidebar {
  position: fixed; top: var(--topbar-h); left: 0; bottom: 0; z-index: 800;
  width: 340px; background: var(--card-bg);
  border-right: 1px solid var(--border);
  box-shadow: 2px 0 12px rgba(0,0,0,0.05);
  display: flex; flex-direction: column;
  transform: translateX(-100%);
  transition: transform 0.3s ease;
}
.sidebar.open { transform: translateX(0); }
.sidebar-header {
  padding: 14px 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: center;
}
.sidebar-header h2 { font-size: 16px; }
.sidebar-tabs {
  display: flex; border-bottom: 1px solid var(--border);
}
.sidebar-tab {
  flex: 1; padding: 10px; text-align: center; font-size: 13px;
  font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent;
  color: var(--text-light); transition: all 0.2s;
}
.sidebar-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
.sidebar-list {
  flex: 1; overflow-y: auto; padding: 10px;
  -webkit-overflow-scrolling: touch;
}
.pin-list-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px; cursor: pointer;
  transition: background 0.2s; margin-bottom: 4px;
}
.pin-list-item:hover, .pin-list-item:active { background: #F1F5F9; }
.pin-list-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.pin-list-info { flex: 1; min-width: 0; }
.pin-list-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.pin-list-detail { font-size: 12px; color: var(--text-light); }

/* ===== PIN CARD (detail popup) ===== */
.pin-card-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); z-index: 2000;
  display: none; align-items: center; justify-content: center;
  padding: 16px;
}
.pin-card-overlay.open { display: flex; }
.pin-card {
  background: var(--card-bg); border-radius: var(--radius);
  width: 100%; max-width: 480px; max-height: 85vh;
  max-height: calc(100% - 32px);
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  box-shadow: var(--shadow); padding: 0;
}
.pin-card-header {
  position: sticky; top: 0; background: var(--card-bg);
  display: flex; justify-content: space-between; align-items: center;
  padding: 16px 20px 12px; z-index: 1;
  border-bottom: 1px solid var(--border);
}
.pin-card-header h2 { font-size: 18px; font-weight: 700; }
.close-btn {
  width: 36px; height: 36px; border-radius: 8px; border: none;
  background: #F1F5F9; cursor: pointer; font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.close-btn:hover, .close-btn:active { background: #E2E8F0; }
.pin-card-body { padding: 14px 20px 20px; }
.field-group { margin-bottom: 14px; }
.field-label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text-light); margin-bottom: 4px; text-transform: uppercase;
  letter-spacing: 0.5px;
}
.field-input, .field-textarea, .field-select {
  width: 100%; padding: 10px 12px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 16px; font-family: inherit;
  transition: border-color 0.2s;
  -webkit-appearance: none;
}
.field-input:focus, .field-textarea:focus, .field-select:focus {
  outline: none; border-color: var(--primary);
}
.field-textarea { resize: vertical; min-height: 60px; }

/* Color/icon picker */
.color-picker-row { display: flex; gap: 8px; flex-wrap: wrap; }
.color-option {
  width: 32px; height: 32px; border-radius: 50%; cursor: pointer;
  border: 3px solid transparent; transition: all 0.15s;
}
.color-option.active { border-color: var(--text); transform: scale(1.15); }

.icon-picker-row { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
.icon-option {
  width: 36px; height: 36px; border-radius: 8px; cursor: pointer;
  border: 2px solid var(--border); display: flex; align-items: center;
  justify-content: center; font-size: 16px; transition: all 0.15s;
}
.icon-option.active { border-color: var(--primary); background: #EEF2FF; }

/* Photo gallery */
.photo-gallery {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; margin-top: 8px;
}
.photo-thumb {
  position: relative; aspect-ratio: 1; border-radius: 8px;
  overflow: hidden; cursor: pointer;
}
.photo-thumb img { width: 100%; height: 100%; object-fit: cover; }
.photo-thumb .remove-photo {
  position: absolute; top: 4px; right: 4px;
  width: 24px; height: 24px; border-radius: 50%;
  background: rgba(0,0,0,0.6); color: #fff;
  border: none; cursor: pointer; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
}
.photo-add-btn {
  aspect-ratio: 1; border-radius: 8px;
  border: 2px dashed var(--border); display: flex;
  align-items: center; justify-content: center;
  cursor: pointer; font-size: 24px; color: var(--text-light);
  transition: all 0.2s;
}
.photo-add-btn:active { border-color: var(--primary); color: var(--primary); }

/* Custom fields */
.custom-field-row {
  display: flex; gap: 6px; align-items: center; margin-bottom: 8px;
}
.custom-field-row input { flex: 1; min-width: 0; }
.remove-field-btn {
  width: 32px; height: 32px; border-radius: 6px;
  border: none; background: #FEE2E2; color: var(--danger);
  cursor: pointer; font-size: 13px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
.remove-field-btn:active { background: #FECACA; }

.pin-card-footer {
  position: sticky; bottom: 0; background: var(--card-bg);
  display: flex; gap: 8px; justify-content: flex-end;
  padding: 14px 20px; border-top: 1px solid var(--border);
}

/* ===== EXPORT MODAL ===== */
.modal-overlay {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.4); z-index: 3000;
  display: none; align-items: center; justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--card-bg); border-radius: var(--radius);
  width: 100%; max-width: 520px; max-height: 80vh;
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  box-shadow: var(--shadow); padding: 20px;
}
.modal h2 { font-size: 18px; margin-bottom: 16px; }
.export-table {
  width: 100%; border-collapse: collapse; font-size: 13px;
}
.export-table th, .export-table td {
  padding: 8px 10px; text-align: left;
  border-bottom: 1px solid var(--border);
}
.export-table th { font-weight: 600; color: var(--text-light); font-size: 12px; text-transform: uppercase; }
.category-badge {
  display: inline-block; padding: 2px 8px; border-radius: 99px;
  font-size: 11px; font-weight: 600;
}
.category-visited { background: #DCFCE7; color: #166534; }
.category-want { background: #FEF3C7; color: #92400E; }

/* ===== CONTEXT MENU (right-click / long-press) ===== */
.context-menu {
  position: fixed; z-index: 1500;
  background: var(--card-bg); border-radius: 10px;
  box-shadow: var(--shadow); padding: 4px;
  min-width: 180px; display: none;
}
.context-menu.open { display: block; }
.context-menu-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; border-radius: 8px; cursor: pointer;
  font-size: 14px; font-weight: 500;
}
.context-menu-item:hover, .context-menu-item:active { background: #F1F5F9; }
.context-menu-item i { width: 18px; text-align: center; }

/* ===== TOOLTIP ===== */
.pin-tooltip {
  background: var(--card-bg) !important;
  border: 1px solid var(--border) !important;
  border-radius: 6px !important;
  padding: 4px 10px !important;
  font-size: 13px !important;
  font-weight: 600 !important;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1) !important;
  color: var(--text) !important;
}
.pin-tooltip::before { border-top-color: var(--border) !important; }

/* ===== CROSSHAIR ON MAP ===== */
.map-adding-pin { cursor: crosshair !important; }

/* ===== ADD PIN MODE BANNER ===== */
.add-pin-banner {
  position: fixed; top: calc(var(--topbar-h) + 8px); left: 50%; transform: translateX(-50%);
  z-index: 1100; background: var(--primary); color: #fff;
  padding: 10px 20px; border-radius: 99px;
  font-size: 14px; font-weight: 600;
  box-shadow: 0 4px 16px rgba(79,70,229,0.4);
  display: none; align-items: center; gap: 10px;
  white-space: nowrap;
}
.add-pin-banner.show { display: flex; }
.add-pin-banner .cancel-add {
  background: rgba(255,255,255,0.2); border: none; color: #fff;
  padding: 4px 12px; border-radius: 99px; cursor: pointer;
  font-size: 12px; font-weight: 600;
}
.add-pin-banner .cancel-add:active { background: rgba(255,255,255,0.3); }

/* ===== STATS ===== */
.stats-bar {
  position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
  z-index: 900; display: flex; gap: 10px;
  padding-bottom: var(--safe-bottom);
}
.stat-chip {
  background: var(--card-bg); border: 1px solid var(--border);
  border-radius: 99px; padding: 7px 14px;
  font-size: 13px; font-weight: 600;
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  display: flex; align-items: center; gap: 6px;
}
.stat-dot { width: 8px; height: 8px; border-radius: 50%; }

/* ===== IMAGE VIEWER ===== */
.image-viewer {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85); z-index: 4000;
  display: none; align-items: center; justify-content: center;
  cursor: pointer;
}
.image-viewer.open { display: flex; }
.image-viewer img { max-width: 92%; max-height: 92%; border-radius: 8px; }

/* ===== MOBILE FAB (floating action button) ===== */
.fab-add {
  display: none;
  position: fixed; bottom: 80px; right: 16px; z-index: 950;
  width: 56px; height: 56px; border-radius: 50%;
  background: var(--primary); color: #fff; border: none;
  font-size: 22px; cursor: pointer;
  box-shadow: 0 4px 16px rgba(79,70,229,0.4);
  align-items: center; justify-content: center;
  padding-bottom: var(--safe-bottom);
}
.fab-add:active { transform: scale(0.92); }

/* ================================================
   RESPONSIVE - TABLET (iPad)
   ================================================ */
@media (max-width: 1024px) {
  .sidebar { width: 320px; }
}

/* ================================================
   RESPONSIVE - MOBILE
   ================================================ */
@media (max-width: 640px) {
  :root { --topbar-h: 48px; }

  .topbar { padding: 0 10px; }
  .topbar h1 { font-size: 15px; }
  .topbar h1 .fa-globe-americas { display: none; }

  /* Hide button labels on mobile, show only icons */
  .btn .btn-label { display: none; }
  .btn { padding: 8px 10px; gap: 0; min-width: 36px; justify-content: center; }

  /* Show FAB on mobile */
  .fab-add { display: flex; }

  /* Hide desktop add button on mobile */
  .topbar-actions .btn-add-desktop { display: none; }

  .sidebar { width: 100%; }
  .sidebar-list { padding-bottom: 80px; }

  .pin-card-overlay { padding: 0; align-items: flex-end; }
  .pin-card {
    max-width: 100%; max-height: 92vh;
    border-radius: var(--radius) var(--radius) 0 0;
  }

  .modal-overlay { padding: 0; align-items: flex-end; }
  .modal {
    max-width: 100%; max-height: 85vh;
    border-radius: var(--radius) var(--radius) 0 0;
    padding-bottom: calc(20px + var(--safe-bottom));
  }

  .stats-bar { bottom: 12px; gap: 6px; }
  .stat-chip { padding: 6px 10px; font-size: 12px; }

  .add-pin-banner { font-size: 13px; padding: 8px 16px; }

  .context-menu { min-width: 160px; }

  .pin-card-footer {
    padding-bottom: calc(14px + var(--safe-bottom));
  }

  .export-table { font-size: 12px; }
  .export-table th, .export-table td { padding: 6px 6px; }

  /* Color/icon picker smaller on mobile */
  .color-option { width: 28px; height: 28px; }
  .icon-option { width: 32px; height: 32px; font-size: 14px; }

  .auth-panel { width: 100%; max-width: 100%; border-radius: 0 0 var(--radius) var(--radius); border-left: none; }
}

/* ================================================
   RESPONSIVE - SMALL PHONE
   ================================================ */
@media (max-width: 380px) {
  .topbar h1 { font-size: 13px; }
  .stat-chip { padding: 5px 8px; font-size: 11px; }
  .pin-card-body { padding: 12px 16px 16px; }
}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-left">
    <button class="btn btn-sm" onclick="toggleSidebar()" title="圖釘清單">
      <i class="fas fa-list"></i>
    </button>
    <h1><i class="fas fa-globe-americas"></i> Travel Pin Map</h1>
  </div>
  <div class="topbar-actions">
    <button class="btn btn-add-desktop" onclick="startAddPin()"><i class="fas fa-map-pin"></i><span class="btn-label"> 新增圖釘</span></button>
    <button class="btn" onclick="openExport()"><i class="fas fa-file-export"></i><span class="btn-label"> 匯出</span></button>
    <button class="btn" id="authBtn" onclick="toggleAuth()"><i class="fas fa-user"></i><span class="btn-label"> 登入</span></button>
  </div>
</div>

<!-- AUTH PANEL -->
<div class="auth-panel" id="authPanel">
  <div id="authForm">
    <h3>登入 / 註冊</h3>
    <input type="email" id="authEmail" placeholder="Email" autocomplete="email">
    <input type="password" id="authPassword" placeholder="密碼" autocomplete="current-password">
    <div class="auth-actions">
      <button class="btn btn-primary" onclick="signIn()"><span class="btn-label">登入</span></button>
      <button class="btn" onclick="signUp()"><span class="btn-label">註冊</span></button>
    </div>
    <p style="margin-top:10px;font-size:12px;color:var(--text-light);">
      首次使用請先註冊，資料將儲存於雲端。
    </p>
  </div>
  <div id="authInfo" style="display:none;">
    <div class="user-info" id="userEmail"></div>
    <button class="btn btn-sm" style="margin-top:10px;" onclick="signOut()">
      <i class="fas fa-sign-out-alt"></i><span class="btn-label"> 登出</span>
    </button>
  </div>
</div>

<!-- MAP -->
<div id="map"></div>

<!-- ADD PIN MODE BANNER -->
<div class="add-pin-banner" id="addPinBanner">
  <i class="fas fa-crosshairs"></i>
  <span class="banner-text">點擊地圖放置圖釘</span>
  <button class="cancel-add" onclick="cancelAddPin()">取消</button>
</div>

<!-- MOBILE FAB -->
<button class="fab-add" id="fabAdd" onclick="startAddPin()" title="新增圖釘">
  <i class="fas fa-plus"></i>
</button>

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2><i class="fas fa-map-marker-alt"></i> 圖釘清單</h2>
    <button class="close-btn" onclick="toggleSidebar()">&times;</button>
  </div>
  <div class="sidebar-tabs">
    <div class="sidebar-tab active" data-tab="all" onclick="switchTab('all')">全部</div>
    <div class="sidebar-tab" data-tab="visited" onclick="switchTab('visited')">已去過</div>
    <div class="sidebar-tab" data-tab="want_to_go" onclick="switchTab('want_to_go')">想去</div>
  </div>
  <div class="sidebar-list" id="pinList"></div>
</div>

<!-- PIN CARD (detail / edit) -->
<div class="pin-card-overlay" id="pinCardOverlay">
  <div class="pin-card">
    <div class="pin-card-header">
      <h2 id="pinCardTitle">編輯圖釘</h2>
      <button class="close-btn" onclick="closePinCard()">&times;</button>
    </div>
    <div class="pin-card-body">
      <!-- Category -->
      <div class="field-group">
        <label class="field-label">分類</label>
        <select class="field-select" id="pinCategory">
          <option value="visited">已去過</option>
          <option value="want_to_go">未來想去</option>
        </select>
      </div>
      <!-- Country -->
      <div class="field-group">
        <label class="field-label">國家</label>
        <input class="field-input" id="pinCountry" placeholder="例：日本">
      </div>
      <!-- City -->
      <div class="field-group">
        <label class="field-label">城市</label>
        <input class="field-input" id="pinCity" placeholder="例：東京">
      </div>
      <!-- Year -->
      <div class="field-group">
        <label class="field-label">年度</label>
        <input class="field-input" id="pinYear" placeholder="例：2025" inputmode="numeric">
      </div>
      <!-- Reason -->
      <div class="field-group">
        <label class="field-label">理由 / 備註</label>
        <textarea class="field-textarea" id="pinReason" placeholder="想去的理由，或旅行心得..."></textarea>
      </div>
      <!-- Budget -->
      <div class="field-group">
        <label class="field-label">預計花費</label>
        <input class="field-input" id="pinBudget" placeholder="例：NT$ 50,000">
      </div>
      <!-- Color -->
      <div class="field-group">
        <label class="field-label">圖釘顏色</label>
        <div class="color-picker-row" id="colorPicker"></div>
      </div>
      <!-- Icon -->
      <div class="field-group">
        <label class="field-label">圖釘樣式</label>
        <div class="icon-picker-row" id="iconPicker"></div>
      </div>
      <!-- Photos -->
      <div class="field-group">
        <label class="field-label">照片</label>
        <div class="photo-gallery" id="photoGallery"></div>
      </div>
      <!-- Custom fields -->
      <div class="field-group">
        <label class="field-label">自訂欄位</label>
        <div id="customFields"></div>
        <button class="btn btn-sm" style="margin-top:6px;" onclick="addCustomField()">
          <i class="fas fa-plus"></i><span class="btn-label"> 新增欄位</span>
        </button>

        <i class="fas fa-trash"></i><span class="btn-label"> 刪除</span>
      </button>
      <button class="btn" onclick="closePinCard()">取消</button>
      <button class="btn btn-primary" onclick="savePin()"><i class="fas fa-check"></i> 儲存</button>
    </div>
  </div>
</div>

<!-- EXPORT MODAL -->
<div class="modal-overlay" id="exportOverlay">

      <button class="btn" onclick="exportJSON()"><i class="fas fa-code"></i><span class="btn-label"> JSON</span></button>

<!-- CONTEXT MENU -->
<div class="context-menu" id="contextMenu">
  <div class="context-menu-item" onclick="contextAddVisited()">
    <i class="fas fa-check-circle" style="color:#22C55E"></i> 已去過
  </div>
  <div class="context-menu-item" onclick="contextAddWant()">
    <i class="fas fa-heart" style="color:#F59E0B"></i> 未來想去
  </div>
</div>

<!-- IMAGE VIEWER -->
<div class="image-viewer" id="imageViewer" onclick="this.classList.remove('open')">
  <img id="imageViewerImg" src="">
</div>

<!-- STATS BAR -->
<div class="stats-bar">
  <div class="stat-chip">
    <span class="stat-dot" style="background:#22C55E;"></span>
    已去過 <span id="statVisited">0</span>
  </div>
  <div class="stat-chip">
    <span class="stat-dot" style="background:#F59E0B;"></span>
    想去 <span id="statWant">0</span>
  </div>
</div>

<input type="file" id="photoInput" accept="image/*" multiple style="display:none">

<!-- SCRIPTS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// =============================================
// CONFIG
// =============================================
const SUPABASE_URL = 'YOUR_SUPABASE_URL';
const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';
let supabase = null;

// =============================================
// STATE
// =============================================
let pins = [];
let markers = {};
let currentPin = null;
let isAddingPin = false;
let addPinCategory = 'want_to_go';
let currentUser = null;
let currentTab = 'all';
let exportTab = 'all';
let contextLatLng = null;
let tempPhotos = [];
let localMode = false;
const isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;

// =============================================
// PIN COLORS & ICONS
// =============================================
const PIN_COLORS = [
  '#EF4444', '#F59E0B', '#22C55E', '#3B82F6',
  '#8B5CF6', '#EC4899', '#14B8A6', '#F97316',
  '#6366F1', '#64748B'
];
const PIN_ICONS = [
  { id: 'default', icon: 'fa-location-dot', label: '標準' },
  { id: 'star', icon: 'fa-star', label: '星星' },
  { id: 'heart', icon: 'fa-heart', label: '愛心' },
  { id: 'flag', icon: 'fa-flag', label: '旗幟' },
  { id: 'plane', icon: 'fa-plane', label: '飛機' },
  { id: 'camera', icon: 'fa-camera', label: '相機' },
  { id: 'utensils', icon: 'fa-utensils', label: '美食' },
  { id: 'mountain', icon: 'fa-mountain-sun', label: '自然' },
  { id: 'building', icon: 'fa-building-columns', label: '古蹟' },
  { id: 'beach', icon: 'fa-umbrella-beach', label: '海灘' },
];

// =============================================
// MAP INIT
// =============================================
const map = L.map('map', {
  center: [25, 121],
  zoom: 3,
  zoomControl: false,
  worldCopyJump: true,
  // iPad/iOS touch fixes
  tap: true,
  tapTolerance: 15,
  touchZoom: true,
  dragging: true,
  bounceAtZoomLimits: false
});

L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom: 19
}).addTo(map);

// Force map to recalculate size (critical for iOS)
setTimeout(function() { map.invalidateSize(); }, 300);
setTimeout(function() { map.invalidateSize(); }, 1000);
window.addEventListener('resize', function() { map.invalidateSize(); });
window.addEventListener('orientationchange', function() {
  setTimeout(function() { map.invalidateSize(); }, 500);
});

// =============================================
// MAP EVENTS
// =============================================
map.on('click', function(e) {
  closeContextMenu();
  if (isAddingPin) {
    openNewPinCard(e.latlng.lat, e.latlng.lng, addPinCategory);
    cancelAddPin();
  }
});

// Desktop: right-click context menu
map.on('contextmenu', function(e) {
  e.originalEvent.preventDefault();
  showContextMenu(e.latlng, e.originalEvent.clientX, e.originalEvent.clientY);
});

// Touch devices: long-press to add pin (replaces right-click)
(function() {
  if (!isTouchDevice) return;
  let longPressTimer = null;
  let startTouch = null;
  const mapEl = document.getElementById('map');

  mapEl.addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) return;
    startTouch = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    longPressTimer = setTimeout(function() {
      // Convert screen coords to map latlng
      const pt = map.containerPointToLatLng(L.point(
        startTouch.x - mapEl.getBoundingClientRect().left,
        startTouch.y - mapEl.getBoundingClientRect().top
      ));
      showContextMenu(pt, startTouch.x, startTouch.y);
    }, 600);
  }, { passive: true });

  mapEl.addEventListener('touchmove', function(e) {
    if (!startTouch) return;
    const dx = e.touches[0].clientX - startTouch.x;
    const dy = e.touches[0].clientY - startTouch.y;
    if (Math.sqrt(dx*dx + dy*dy) > 10) {
      clearTimeout(longPressTimer);
      startTouch = null;
    }
  }, { passive: true });

  mapEl.addEventListener('touchend', function() {
    clearTimeout(longPressTimer);
    startTouch = null;
  }, { passive: true });

  mapEl.addEventListener('touchcancel', function() {
    clearTimeout(longPressTimer);
    startTouch = null;
  }, { passive: true });
})();

function showContextMenu(latlng, clientX, clientY) {
  contextLatLng = latlng;
  const cm = document.getElementById('contextMenu');
  // Keep menu within viewport
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  let x = clientX;
  let y = clientY;
  if (x + 180 > vw) x = vw - 190;
  if (y + 100 > vh) y = vh - 110;
  if (x < 8) x = 8;
  if (y < 8) y = 8;
  cm.style.left = x + 'px';
  cm.style.top = y + 'px';
  cm.classList.add('open');
}

document.addEventListener('click', function() { closeContextMenu(); });
document.addEventListener('touchstart', function(e) {
  if (!e.target.closest('.context-menu')) closeContextMenu();
}, { passive: true });

document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    cancelAddPin();
    closePinCard();
    closeExport();
    closeContextMenu();
    document.getElementById('imageViewer').classList.remove('open');
  }
});

function closeContextMenu() {
  document.getElementById('contextMenu').classList.remove('open');
}

function contextAddVisited() {
  if (contextLatLng) openNewPinCard(contextLatLng.lat, contextLatLng.lng, 'visited');
  closeContextMenu();
}
function contextAddWant() {
  if (contextLatLng) openNewPinCard(contextLatLng.lat, contextLatLng.lng, 'want_to_go');
  closeContextMenu();
}

// =============================================
// ADD PIN MODE
// =============================================
function startAddPin() {
  isAddingPin = true;
  addPinCategory = 'want_to_go';
  document.getElementById('map').classList.add('map-adding-pin');
  document.getElementById('addPinBanner').classList.add('show');
  // Hide FAB while adding
  document.getElementById('fabAdd').style.display = 'none';
}

function cancelAddPin() {
  isAddingPin = false;
  document.getElementById('map').classList.remove('map-adding-pin');
  document.getElementById('addPinBanner').classList.remove('show');
  // Restore FAB on mobile
  if (isTouchDevice || window.innerWidth <= 640) {
    document.getElementById('fabAdd').style.display = 'flex';
  }
}

// =============================================
// MARKER CREATION
// =============================================
function createMarkerIcon(color, iconId) {
  var iconDef = PIN_ICONS.find(function(i) { return i.id === iconId; }) || PIN_ICONS[0];
  return L.divIcon({
    className: 'custom-pin',
    html: '<div style="' +
      'width:36px;height:36px;border-radius:50% 50% 50% 0;' +
      'background:' + color + ';transform:rotate(-45deg);' +
      'display:flex;align-items:center;justify-content:center;' +
      'box-shadow:0 2px 8px rgba(0,0,0,0.3);border:2px solid #fff;' +
    '"><i class="fas ' + iconDef.icon + '" style="' +
      'color:#fff;font-size:14px;transform:rotate(45deg);' +
    '"></i></div>',
    iconSize: [36, 36],
    iconAnchor: [18, 36],
    tooltipAnchor: [0, -36]
  });
}

function addMarker(pin) {
  var marker = L.marker([pin.latitude, pin.longitude], {
    icon: createMarkerIcon(pin.pin_color, pin.pin_icon),
    draggable: false
  }).addTo(map);

  var label = pin.country_name || pin.city_name || '未命名';
  marker.bindTooltip(label, {
    permanent: true,
    direction: 'top',
    className: 'pin-tooltip',
    offset: [0, -4]
  });

  marker.on('click', function() { openEditPinCard(pin); });

  markers[pin.id] = marker;
}

function removeMarker(pinId) {
  if (markers[pinId]) {
    map.removeLayer(markers[pinId]);
    delete markers[pinId];
  }
}

function refreshMarkers() {
  Object.keys(markers).forEach(function(id) {
    map.removeLayer(markers[id]);
  });
  markers = {};
  pins.forEach(function(pin) { addMarker(pin); });
  updateStats();
  renderPinList();
}

// =============================================
// PIN CARD
// =============================================
function openNewPinCard(lat, lng, category) {
  currentPin = {
    id: null,
    latitude: lat,
    longitude: lng,
    country_name: '',
    city_name: '',
    category: category || 'want_to_go',
    pin_color: category === 'visited' ? '#22C55E' : '#F59E0B',
    pin_icon: 'default',
    year: '',
    reason: '',
    budget: '',
    notes: '',
    photos: [],
    custom_fields: []
  };
  tempPhotos = [];
  document.getElementById('pinDeleteBtn').style.display = 'none';
  document.getElementById('pinCardTitle').textContent = '新增圖釘';
  fillPinCard();
  document.getElementById('pinCardOverlay').classList.add('open');
  reverseGeocode(lat, lng);
}

function openEditPinCard(pin) {
  currentPin = JSON.parse(JSON.stringify(pin));
  tempPhotos = pin.photos ? pin.photos.slice() : [];
  document.getElementById('pinDeleteBtn').style.display = '';
  document.getElementById('pinCardTitle').textContent = '編輯圖釘';
  fillPinCard();
  document.getElementById('pinCardOverlay').classList.add('open');
}

function closePinCard() {
  document.getElementById('pinCardOverlay').classList.remove('open');
  currentPin = null;
  tempPhotos = [];
}

function fillPinCard() {
  document.getElementById('pinCategory').value = currentPin.category;
  document.getElementById('pinCountry').value = currentPin.country_name || '';
  document.getElementById('pinCity').value = currentPin.city_name || '';
  document.getElementById('pinYear').value = currentPin.year || '';
  document.getElementById('pinReason').value = currentPin.reason || '';
  document.getElementById('pinBudget').value = currentPin.budget || '';

  var colorRow = document.getElementById('colorPicker');
  colorRow.innerHTML = PIN_COLORS.map(function(c) {
    return '<div class="color-option ' + (currentPin.pin_color === c ? 'active' : '') + '" style="background:' + c + '" onclick="selectColor(\'' + c + '\')"></div>';
  }).join('');

  var iconRow = document.getElementById('iconPicker');
  iconRow.innerHTML = PIN_ICONS.map(function(i) {
    return '<div class="icon-option ' + (currentPin.pin_icon === i.id ? 'active' : '') + '" onclick="selectIcon(\'' + i.id + '\')" title="' + i.label + '"><i class="fas ' + i.icon + '"></i></div>';
  }).join('');

  renderPhotos();
  renderCustomFields();
}

function selectColor(color) {
  currentPin.pin_color = color;
  var colorRow = document.getElementById('colorPicker');
  colorRow.innerHTML = PIN_COLORS.map(function(c) {
    return '<div class="color-option ' + (currentPin.pin_color === c ? 'active' : '') + '" style="background:' + c + '" onclick="selectColor(\'' + c + '\')"></div>';
  }).join('');
}

function selectIcon(iconId) {
  currentPin.pin_icon = iconId;
  var iconRow = document.getElementById('iconPicker');
  iconRow.innerHTML = PIN_ICONS.map(function(i) {
    return '<div class="icon-option ' + (currentPin.pin_icon === i.id ? 'active' : '') + '" onclick="selectIcon(\'' + i.id + '\')" title="' + i.label + '"><i class="fas ' + i.icon + '"></i></div>';
  }).join('');
}

// ===== Photos =====
function renderPhotos() {
  var gallery = document.getElementById('photoGallery');
  var html = '';
  tempPhotos.forEach(function(photo, idx) {
    var url = typeof photo === 'string' ? photo : (photo.photo_url || photo.url);
    html += '<div class="photo-thumb"><img src="' + url + '" onclick="viewImage(this.src)"><button class="remove-photo" onclick="removePhoto(' + idx + ')">&times;</button></div>';
  });
  html += '<div class="photo-add-btn" onclick="document.getElementById(\'photoInput\').click()">+</div>';
  gallery.innerHTML = html;
}

function removePhoto(idx) {
  tempPhotos.splice(idx, 1);
  renderPhotos();
}

function viewImage(url) {
  document.getElementById('imageViewerImg').src = url;
  document.getElementById('imageViewer').classList.add('open');
}

document.getElementById('photoInput').addEventListener('change', function(e) {
  Array.from(e.target.files).forEach(function(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      tempPhotos.push({ photo_url: ev.target.result, file: file, isNew: true });
      renderPhotos();
    };
    reader.readAsDataURL(file);
  });
  e.target.value = '';
});

// ===== Custom Fields =====
function renderCustomFields() {
  var container = document.getElementById('customFields');
  var fields = currentPin.custom_fields || [];
  container.innerHTML = fields.map(function(f, idx) {
    return '<div class="custom-field-row">' +
      '<input class="field-input" placeholder="欄位名稱" value="' + escapeHtml(f.field_name || '') + '" onchange="updateCustomField(' + idx + ',\'field_name\',this.value)" style="max-width:120px;">' +
      '<input class="field-input" placeholder="內容" value="' + escapeHtml(f.field_value || '') + '" onchange="updateCustomField(' + idx + ',\'field_value\',this.value)">' +
      '<button class="remove-field-btn" onclick="removeCustomField(' + idx + ')"><i class="fas fa-times"></i></button></div>';
  }).join('');
}

function addCustomField() {
  if (!currentPin.custom_fields) currentPin.custom_fields = [];
  currentPin.custom_fields.push({ field_name: '', field_value: '', sort_order: currentPin.custom_fields.length });
  renderCustomFields();
}

function removeCustomField(idx) {
  currentPin.custom_fields.splice(idx, 1);
  renderCustomFields();
}

function updateCustomField(idx, key, value) {
  currentPin.custom_fields[idx][key] = value;
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// =============================================
// SAVE / DELETE PIN
// =============================================
async function savePin() {
  currentPin.category = document.getElementById('pinCategory').value;
  currentPin.country_name = document.getElementById('pinCountry').value;
  currentPin.city_name = document.getElementById('pinCity').value;
  currentPin.year = document.getElementById('pinYear').value;
  currentPin.reason = document.getElementById('pinReason').value;
  currentPin.budget = document.getElementById('pinBudget').value;

  if (localMode || !supabase || !currentUser) {
    if (!currentPin.id) {
      currentPin.id = 'local_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
    }
    currentPin.photos = tempPhotos.map(function(p) { return typeof p === 'string' ? p : (p.photo_url || p.url); });
    var idx = pins.findIndex(function(p) { return p.id === currentPin.id; });
    if (idx >= 0) {
      pins[idx] = JSON.parse(JSON.stringify(currentPin));
    } else {
      pins.push(JSON.parse(JSON.stringify(currentPin)));
    }
    saveToLocal();
    refreshMarkers();
    closePinCard();
    return;
  }

  try {
    var pinData = {
      user_id: currentUser.id,
      latitude: currentPin.latitude,
      longitude: currentPin.longitude,
      country_name: currentPin.country_name,
      city_name: currentPin.city_name,
      category: currentPin.category,
      pin_color: currentPin.pin_color,
      pin_icon: currentPin.pin_icon,
      year: currentPin.year,
      reason: currentPin.reason,
      budget: currentPin.budget,
      notes: currentPin.notes || ''
    };
    var pinId = currentPin.id;
    if (!pinId || String(pinId).startsWith('local_')) {
      var res = await supabase.from('pins').insert(pinData).select().single();
      if (res.error) throw res.error;
      pinId = res.data.id;
    } else {
      var res2 = await supabase.from('pins').update(pinData).eq('id', pinId);
      if (res2.error) throw res2.error;
    }
    for (var i = 0; i < tempPhotos.length; i++) {
      var photo = tempPhotos[i];
      if (photo.isNew && photo.file) {
        var path = currentUser.id + '/' + pinId + '/' + Date.now() + '_' + photo.file.name;
        var upRes = await supabase.storage.from('pin-photos').upload(path, photo.file);
        if (!upRes.error) {
          var urlData = supabase.storage.from('pin-photos').getPublicUrl(path);
          await supabase.from('pin_photos').insert({ pin_id: pinId, photo_url: urlData.data.publicUrl, storage_path: path });
        }
      }
    }
    await supabase.from('pin_custom_fields').delete().eq('pin_id', pinId);
    if (currentPin.custom_fields && currentPin.custom_fields.length > 0) {
      var fields = currentPin.custom_fields.map(function(f, i) {
        return { pin_id: pinId, field_name: f.field_name, field_value: f.field_value, sort_order: i };
      });
      await supabase.from('pin_custom_fields').insert(fields);
    }
    await loadPins();
    closePinCard();
  } catch (err) {
    alert('儲存失敗: ' + err.message);
  }
}

async function deletePin() {
  if (!currentPin || !currentPin.id) return;
  if (!confirm('確定要刪除這個圖釘嗎？')) return;
  if (localMode || !supabase || !currentUser) {
    pins = pins.filter(function(p) { return p.id !== currentPin.id; });
    removeMarker(currentPin.id);
    saveToLocal();
    updateStats();
    renderPinList();
    closePinCard();
    return;
  }
  try {
    var photos = await supabase.from('pin_photos').select('storage_path').eq('pin_id', currentPin.id);
    if (photos.data) {
      for (var i = 0; i < photos.data.length; i++) {
        if (photos.data[i].storage_path) await supabase.storage.from('pin-photos').remove([photos.data[i].storage_path]);
      }
    }
    await supabase.from('pins').delete().eq('id', currentPin.id);
    await loadPins();
    closePinCard();
  } catch (err) {
    alert('刪除失敗: ' + err.message);
  }
}

// =============================================
// LOAD PINS
// =============================================
async function loadPins() {
  if (localMode || !supabase || !currentUser) {
    var saved = localStorage.getItem('travel_map_pins');
    if (saved) {
      try { pins = JSON.parse(saved); } catch(e) { pins = []; }
    }
    refreshMarkers();
    return;
  }
  try {
    var res = await supabase
      .from('pins')
      .select('*, pin_photos(*), pin_custom_fields(*)')
      .eq('user_id', currentUser.id)
      .order('created_at', { ascending: false });
    if (res.error) throw res.error;
    pins = (res.data || []).map(function(p) {
      return Object.assign({}, p, {
        photos: (p.pin_photos || []).map(function(ph) { return ph.photo_url; }),
        custom_fields: (p.pin_custom_fields || []).sort(function(a, b) { return a.sort_order - b.sort_order; })
      });
    });
    refreshMarkers();
  } catch (err) {
    console.error('Load pins error:', err);
    localMode = true;
    loadPins();
  }
}

function saveToLocal() {
  localStorage.setItem('travel_map_pins', JSON.stringify(pins));
}

// =============================================
// REVERSE GEOCODE
// =============================================
async function reverseGeocode(lat, lng) {
  try {
    var resp = await fetch('https://nominatim.openstreetmap.org/reverse?lat=' + lat + '&lon=' + lng + '&format=json&accept-language=zh-TW');
    var data = await resp.json();
    if (data.address) {
      var country = data.address.country || '';
      var city = data.address.city || data.address.town || data.address.village || data.address.state || '';
      if (currentPin) {
        currentPin.country_name = country;
        currentPin.city_name = city;
        document.getElementById('pinCountry').value = country;
        document.getElementById('pinCity').value = city;
      }
    }
  } catch(e) {
    console.log('Geocode failed:', e);
  }
}

// =============================================
// SIDEBAR
// =============================================
function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.sidebar-tab[data-tab]').forEach(function(el) {
    el.classList.toggle('active', el.dataset.tab === tab);
  });
  renderPinList();
}

function renderPinList() {
  var list = document.getElementById('pinList');
  var filtered = currentTab === 'all' ? pins : pins.filter(function(p) { return p.category === currentTab; });
  if (filtered.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:40px 20px;color:var(--text-light);"><i class="fas fa-map-marker-alt" style="font-size:32px;margin-bottom:12px;display:block;"></i>' +
      (isTouchDevice ? '長按地圖或點擊 + 新增圖釘！' : '點擊地圖或右鍵新增圖釘！') + '</div>';
    return;
  }
  list.innerHTML = filtered.map(function(pin) {
    return '<div class="pin-list-item" onclick="flyToPin(\'' + pin.id + '\')">' +
      '<div class="pin-list-dot" style="background:' + pin.pin_color + '"></div>' +
      '<div class="pin-list-info"><div class="pin-list-name">' + escapeHtml(pin.country_name || '未命名') + '</div>' +
      '<div class="pin-list-detail">' +
      (pin.city_name ? escapeHtml(pin.city_name) + ' · ' : '') +
      (pin.category === 'visited' ? '已去過' : '想去') +
      (pin.year ? ' · ' + escapeHtml(pin.year) : '') +
      '</div></div></div>';
  }).join('');
}

function flyToPin(pinId) {
  var pin = pins.find(function(p) { return p.id === pinId || String(p.id) === pinId; });
  if (pin) {
    // Close sidebar on mobile
    if (window.innerWidth <= 640) document.getElementById('sidebar').classList.remove('open');
    map.flyTo([pin.latitude, pin.longitude], 8, { duration: 0.8 });
    setTimeout(function() { openEditPinCard(pin); }, 300);
  }
}

// =============================================
// STATS
// =============================================
function updateStats() {
  document.getElementById('statVisited').textContent = pins.filter(function(p) { return p.category === 'visited'; }).length;
  document.getElementById('statWant').textContent = pins.filter(function(p) { return p.category === 'want_to_go'; }).length;
}

// =============================================
// EXPORT
// =============================================
function openExport() {
  exportTab = 'all';
  document.querySelectorAll('.sidebar-tab[data-export]').forEach(function(el) {
    el.classList.toggle('active', el.dataset.export === 'all');
  });
  renderExportTable();
  document.getElementById('exportOverlay').classList.add('open');
}
function closeExport() { document.getElementById('exportOverlay').classList.remove('open'); }

function switchExportTab(tab) {
  exportTab = tab;
  document.querySelectorAll('.sidebar-tab[data-export]').forEach(function(el) {
    el.classList.toggle('active', el.dataset.export === tab);
  });
  renderExportTable();
}

function getExportPins() {
  return exportTab === 'all' ? pins : pins.filter(function(p) { return p.category === exportTab; });
}

function renderExportTable() {
  var list = getExportPins();
  if (list.length === 0) {
    document.getElementById('exportContent').innerHTML = '<p style="text-align:center;color:var(--text-light);padding:20px;">沒有資料</p>';
    return;
  }
  document.getElementById('exportContent').innerHTML =
    '<table class="export-table"><thead><tr><th>國家</th><th>城市</th><th>分類</th><th>年度</th><th>花費</th></tr></thead><tbody>' +
    list.map(function(p) {
      return '<tr><td>' + escapeHtml(p.country_name || '-') + '</td><td>' + escapeHtml(p.city_name || '-') + '</td>' +
        '<td><span class="category-badge ' + (p.category === 'visited' ? 'category-visited' : 'category-want') + '">' +
        (p.category === 'visited' ? '已去過' : '想去') + '</span></td>' +
        '<td>' + escapeHtml(p.year || '-') + '</td><td>' + escapeHtml(p.budget || '-') + '</td></tr>';
    }).join('') + '</tbody></table>';
}

function exportCSV() {
  var list = getExportPins();
  var headers = ['國家', '城市', '分類', '年度', '理由', '花費', '緯度', '經度'];
  var allCustomKeys = [];
  list.forEach(function(p) { (p.custom_fields || []).forEach(function(f) { if (f.field_name && allCustomKeys.indexOf(f.field_name) === -1) allCustomKeys.push(f.field_name); }); });
  var fullHeaders = headers.concat(allCustomKeys);
  var rows = list.map(function(p) {
    var base = [p.country_name || '', p.city_name || '', p.category === 'visited' ? '已去過' : '想去', p.year || '', p.reason || '', p.budget || '', p.latitude, p.longitude];
    var custom = allCustomKeys.map(function(k) { var f = (p.custom_fields || []).find(function(cf) { return cf.field_name === k; }); return f ? f.field_value : ''; });
    return base.concat(custom);
  });
  var bom = '\uFEFF';
  var csv = bom + [fullHeaders].concat(rows).map(function(r) { return r.map(function(v) { return '"' + String(v).replace(/"/g, '""') + '"'; }).join(','); }).join('\n');
  downloadFile(csv, 'travel-pins.csv', 'text/csv;charset=utf-8');
}

function exportJSON() {
  var list = getExportPins();
  var data = list.map(function(p) {
    var cf = {};
    (p.custom_fields || []).forEach(function(f) { if (f.field_name) cf[f.field_name] = f.field_value; });
    return { country: p.country_name, city: p.city_name, category: p.category === 'visited' ? '已去過' : '想去', year: p.year, reason: p.reason, budget: p.budget, latitude: p.latitude, longitude: p.longitude, custom_fields: cf };
  });
  downloadFile(JSON.stringify(data, null, 2), 'travel-pins.json', 'application/json');
}

function downloadFile(content, filename, mime) {
  var blob = new Blob([content], { type: mime });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(a.href);
}

// =============================================
// AUTH
// =============================================
function toggleAuth() {
  document.getElementById('authPanel').classList.toggle('open');
}

async function signIn() {
  if (!supabase) { alert('請先設定 Supabase URL 和 Key'); return; }
  var email = document.getElementById('authEmail').value;
  var password = document.getElementById('authPassword').value;
  if (!email || !password) return;
  var res = await supabase.auth.signInWithPassword({ email: email, password: password });
  if (res.error) { alert('登入失敗: ' + res.error.message); return; }
  currentUser = res.data.user;
  localMode = false;
  onAuthChange();
}

async function signUp() {
  if (!supabase) { alert('請先設定 Supabase URL 和 Key'); return; }
  var email = document.getElementById('authEmail').value;
  var password = document.getElementById('authPassword').value;
  if (!email || !password) return;
  var res = await supabase.auth.signUp({ email: email, password: password });
  if (res.error) { alert('註冊失敗: ' + res.error.message); return; }
  alert('註冊成功！請確認你的 Email 後再登入。');
}

async function signOut() {
  if (supabase) await supabase.auth.signOut();
  currentUser = null;
  onAuthChange();
}

function onAuthChange() {
  var authBtn = document.getElementById('authBtn');
  var authForm = document.getElementById('authForm');
  var authInfo = document.getElementById('authInfo');
  if (currentUser) {
    authBtn.innerHTML = '<i class="fas fa-user-check"></i><span class="btn-label"> ' + currentUser.email.split('@')[0] + '</span>';
    authForm.style.display = 'none';
    authInfo.style.display = 'block';
    document.getElementById('userEmail').textContent = currentUser.email;
  } else {
    authBtn.innerHTML = '<i class="fas fa-user"></i><span class="btn-label"> 登入</span>';
    authForm.style.display = 'block';
    authInfo.style.display = 'none';
  }
  document.getElementById('authPanel').classList.remove('open');
  loadPins();
}

// =============================================
// INIT
// =============================================
function initSupabase() {
  try {
    if (window.supabase && SUPABASE_URL !== 'YOUR_SUPABASE_URL' && SUPABASE_ANON_KEY !== 'YOUR_SUPABASE_ANON_KEY') {
      supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      console.log('Supabase connected');
    }
  } catch(e) {
    console.warn('Supabase init failed:', e);
    supabase = null;
  }
}

async function init() {
  initSupabase();
  if (!supabase) {
    console.log('Local mode');
    localMode = true;
    loadPins();
    return;
  }
  try {
    var session = await supabase.auth.getSession();
    if (session.data.session) {
      currentUser = session.data.session.user;
      onAuthChange();
    } else {
      localMode = true;
      loadPins();
    }
    supabase.auth.onAuthStateChange(function(event, session) {
      currentUser = session ? session.user : null;
      if (!currentUser) localMode = true;
      onAuthChange();
    });
  } catch(e) {
    localMode = true;
    loadPins();
  }
}

// Load Supabase SDK async - never blocks map
(function() {
  var s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js';
  s.async = true;
  s.onload = function() { init(); };
  s.onerror = function() {
    console.warn('Supabase SDK failed to load');
    localMode = true;
    loadPins();
  };
  document.head.appendChild(s);
})();

// Fallback: if Supabase SDK takes too long, start local mode
setTimeout(function() {
  if (pins.length === 0 && !currentUser) {
    localMode = true;
    loadPins();
  }
}, 3000);
</script>
